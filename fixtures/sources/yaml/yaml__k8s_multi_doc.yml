---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default
data:
  DATABASE_HOST: "postgres:5432"
  REDIS_HOST: "redis:6379"
  LOG_LEVEL: "info"
  MAX_CONNECTIONS: "100"
  TIMEOUT_SECONDS: "30"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-server
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-server
  template:
    spec:
      containers:
        - name: server
          image: app-server:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: app-server-svc
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: app-server
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: grpc
      port: 50051
      targetPort: 50051

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: default
spec:
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: app-server-svc
                port:
                  number: 80
          - path: /health
            pathType: Exact
            backend:
              service:
                name: app-server-svc
                port:
                  number: 80
