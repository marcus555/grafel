apiVersion: v1
kind: Service
metadata:
  name: webapp-api-svc
  namespace: production
spec:
  type: ClusterIP
  selector:
    app: webapp
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics
