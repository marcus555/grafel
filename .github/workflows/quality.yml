name: quality

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Extraction-quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - run: go mod download
      - name: Build grafel
        run: go build -o build/grafel ./cmd/grafel
      - name: Run extraction-quality fixtures
        run: scripts/verify2/run-quality.sh
        env:
          GRAFEL_BIN: ${{ github.workspace }}/build/grafel
          QUALITY_OUT_DIR: ${{ github.workspace }}/reports/quality
      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: reports/quality/*.json
          if-no-files-found: warn
