name: Windows CGO Smoke

# Previously "Windows CGO Experiment" — graduated to stable in #2230 (closes #937).
# MinGW + CGO_ENABLED=1 are now standard on the main test matrix in test.yml.
# This workflow retains the more thorough daemon smoke test (healthz + binary upload).

on:
  workflow_dispatch:
  pull_request_target:
    types: [labeled]

jobs:
  build:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' && contains(github.event.pull_request.labels.*.name, 'ci:full'))
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      # SECURITY NOTE: pull_request_target runs with write permissions but defaults
      # to checking out the BASE branch (main), not the PR's HEAD. This means CI
      # would test main's code, not the PR's changes — a silent correctness failure.
      # We explicitly ref the PR HEAD here. This is safe because the workflow is
      # gated by the `ci:full` label (line 16 above), which only collaborators with
      # write access can apply — making this functionally equivalent to pull_request.
      # The `|| github.sha` fallback handles workflow_dispatch and push-to-main.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup MSYS2 + MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
          update: false

      - name: Enable CGO
        shell: bash
        run: |
          echo "CGO_ENABLED=1" >> $GITHUB_ENV
          echo "CC=x86_64-w64-mingw32-gcc" >> $GITHUB_ENV

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...
        continue-on-error: true   # capture both vet + build signals independently

      - name: go build daemon
        run: go build -v -o archigraph.exe ./cmd/archigraph

      - name: smoke test — start daemon, hit healthz, stop
        shell: powershell
        run: |
          $env:ARCHIGRAPH_DAEMON_ROOT = "$env:RUNNER_TEMP\archigraph-test"
          New-Item -ItemType Directory -Path $env:ARCHIGRAPH_DAEMON_ROOT -Force | Out-Null
          $proc = Start-Process -FilePath ".\archigraph.exe" -ArgumentList "daemon" -PassThru -RedirectStandardOutput "daemon.log" -RedirectStandardError "daemon.err"
          Start-Sleep -Seconds 5
          $code = curl.exe -s -o NUL -w "%{http_code}" http://127.0.0.1:47274/healthz
          Write-Host "healthz response code: $code"
          if ($code -ne "200") {
            Get-Content daemon.log -ErrorAction SilentlyContinue
            Get-Content daemon.err -ErrorAction SilentlyContinue
            Stop-Process -Id $proc.Id -ErrorAction SilentlyContinue
            exit 1
          }
          Stop-Process -Id $proc.Id -Force

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: archigraph-windows-amd64
          path: archigraph.exe
          retention-days: 7

      - name: Upload daemon log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: daemon-logs
          path: |
            daemon.log
            daemon.err
          retention-days: 7
          if-no-files-found: ignore
