name: pre-merge
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-merge-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: gofmt
        run: |
          diff=$(gofmt -l $(git ls-files '*.go') 2>&1)
          if [ -n "$diff" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$diff"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      # Guard against the locale-bug class (#5317): control flow that matches a
      # localized OS command output / error string breaks on non-English locales.
      - name: lint-localematch (locale-invariant command checks)
        run: go run ./cmd/lint-localematch
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webui-v2/package-lock.json
      - name: dashboard (webui-v2) typecheck + build
        working-directory: webui-v2
        run: |
          npm ci
          npm run build
      - name: dashboard (webui-v2) unit tests
        working-directory: webui-v2
        run: npm test
      - name: mcp-audit (handshake budget + description validation)
        run: go run ./cmd/mcp-audit
        env:
          AUDIT_CEILING: "4500"
