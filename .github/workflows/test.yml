name: test

# Free-tier minute budget: macOS bills 10x, Windows 2x — one full 3-OS run ~195 billed min.
# Default: NO auto-CI on routine pushes/PRs. Local `go test -race` is the routine backstop.
# Milestone gate: full 3-platform matrix runs on version tags (push: tags 'v*') + manual workflow_dispatch.
#   → batch the platform checks before shipping a milestone.
# Opt-in: add label `ci:full` to force full 3-platform testing on a specific PR.

on:
  workflow_dispatch:

  push:
    tags: ['v*']

  pull_request_target:
    types: [labeled]

permissions:
  contents: read

jobs:
  test:
    # Gate: run when —
    #   (a) workflow_dispatch / push to main, OR
    #   (b) pull_request_target with the `ci:full` label.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request_target' && contains(github.event.pull_request.labels.*.name, 'ci:full'))

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # SECURITY NOTE: pull_request_target runs with write permissions but defaults
      # to checking out the BASE branch (main), not the PR's HEAD. This means CI
      # would test main's code, not the PR's changes — a silent correctness failure.
      # We explicitly ref the PR HEAD here. This is safe because the workflow is
      # gated by the `ci:full` label (line 28 above), which only collaborators with
      # write access can apply — making this functionally equivalent to pull_request.
      # The `|| github.sha` fallback handles workflow_dispatch and push-to-main.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      # MinGW is required on Windows for CGO (tree-sitter bindings).
      # Resolves #937 / #1796 — no vendor patch needed with CGO_ENABLED=1.
      - name: Setup MSYS2 + MinGW (Windows only)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2.31.1
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
          update: false

      - name: Enable CGO on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "CGO_ENABLED=1" >> $GITHUB_ENV
          echo "CC=x86_64-w64-mingw32-gcc" >> $GITHUB_ENV

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - run: go mod download

      - run: go vet ./...

      # Guard against the locale-bug class (#5317): control flow that matches a
      # localized OS command output / error string (e.g.
      # strings.Contains(out, "cannot find")) breaks on non-English locales.
      # Run on Linux only — it is a static AST check, platform-independent.
      - name: lint-localematch (locale-invariant command checks)
        if: runner.os == 'Linux'
        run: go run ./cmd/lint-localematch

      # gofmt check — only enforce on Linux to avoid CRLF noise from Windows
      # tooling. macOS and Linux share the same line endings in the repo so
      # running on ubuntu-latest is sufficient.
      - name: gofmt
        if: runner.os == 'Linux'
        shell: bash
        run: |
          diff=$(gofmt -l $(git ls-files '*.go') 2>&1)
          if [ -n "$diff" ]; then
            echo "Files need gofmt:"
            echo "$diff"
            exit 1
          fi

      - run: go build ./...

      # Purge BOTH the test-result cache AND the compiled-object cache.
      # actions/setup-go@v5 with cache:true persists ~/.cache/go-build across
      # runs, including compiled test binaries. -count=1 only disables result
      # caching; `go clean -testcache` flushes test results but NOT compiled
      # binaries; only `go clean -cache` flushes the build cache. Without
      # this combined clean, a stale compiled test binary from a previous PR
      # can run, masking the current PR's source changes (refs #2253).
      - run: go clean -cache -testcache

      # Normalize XDG_CONFIG_HOME on macOS so config resolution matches the
      # Linux/Windows runners (#5477). GitHub's ubuntu/windows runners export
      # XDG_CONFIG_HOME=$HOME/.config, which registry.ConfigDir honors first, so
      # an un-isolated config-writing test resolves a path UNDER $HOME and the
      # #5443 fail-closed write-guard panics — catching the leak. The macOS
      # runner leaves XDG_CONFIG_HOME unset, so config resolved elsewhere and the
      # same leak slipped past on macOS-only runs, surfacing only on the two
      # slower-billed OSes. Exporting it here makes all three runners resolve
      # config identically, so the leak-detector catches un-isolated tests on
      # every platform.
      - name: Normalize XDG_CONFIG_HOME (macOS parity with Linux/Windows)
        if: runner.os == 'macOS'
        shell: bash
        run: echo "XDG_CONFIG_HOME=$HOME/.config" >> "$GITHUB_ENV"

      # Non-privileged Windows regression guard (#5316).
      #
      # The blind spot: this windows-latest runner is PRIVILEGED (admin /
      # Developer Mode), so os.Symlink — step 1 of the skill-link fallback chain
      # — succeeds here. That means the junction codepath added by #5318 / #5641
      # (what actually lets a NON-admin user install) is never exercised on CI.
      # A regression that reintroduced an admin-only symlink requirement, or that
      # broke `mklink /J`, would pass green while breaking every real non-admin
      # Windows user — exactly the elevation class a user hit end-to-end.
      #
      # TestLinkSkillDir_NonPrivilegedFallback forces the symlink primitive to
      # fail with the "privilege not held" error a standard user gets, then
      # asserts the junction/copy fallback engages and the link resolves to the
      # source content. It is deterministic (no real privilege drop needed) and
      # goes RED if an admin-only operation is reintroduced on the link path.
      #
      # We run it explicitly (-run, -v) so a skip or accidental removal is loud,
      # rather than relying on it being silently absorbed by `go test ./...`.
      - name: Non-privileged link fallback (Windows admin-regression guard)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          out=$(go test -count=1 -v -run '^TestLinkSkillDir_NonPrivilegedFallback$' \
            ./internal/install/skilllink/ 2>&1)
          echo "$out"
          # The test is build-tagged //go:build windows, so it MUST actually run
          # here — a "no tests to run" / skipped result means the guard silently
          # stopped protecting us; treat that as a failure.
          if ! echo "$out" | grep -q 'PASS: TestLinkSkillDir_NonPrivilegedFallback'; then
            echo "::error::non-privileged link fallback guard did not run/pass (#5316)"
            exit 1
          fi

      # Race detector policy (#2406):
      #   - push to main → always race (post-merge sanity)
      #   - release event → always race
      #   - PR with ci:full label → race (platform-sensitive opt-in)
      #   - all other CI runs (standard PRs) → no race; saves ~4 min per run
      #
      # -timeout 15m: the suite with -race on a loaded CI runner can take
      # 8-10 min end-to-end. Without -race, 3-4 min is the observed ceiling.
      # 15m gives headroom for both modes while catching real deadlocks well
      # before GitHub's 6-hour job limit (refs #1797 / #937 / #2196).
      - name: Test
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]] || \
             [[ "${{ github.event_name }}" == "release" ]] || \
             [[ "${{ contains(github.event.pull_request.labels.*.name, 'ci:full') }}" == "true" ]]; then
            echo "Running with -race (main / release / ci:full label)"
            go test -race -count=1 -timeout 15m ./...
          else
            echo "Running without -race (PR fast path)"
            go test -count=1 -timeout 15m ./...
          fi
