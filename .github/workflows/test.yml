name: test

# Default: runs automatically on PRs that touch Go source or config files.
# Skip: PRs that only change docs/assets/skills/testdata — those run zero test
#       jobs (board-hygiene still fires).
# Opt-in: add label `ci:full` to force this workflow on any PR regardless of
#         the path filter (e.g. a pure-docs PR that you still want validated).
# Manual: `workflow_dispatch` from the Actions tab runs unconditionally.
# Post-merge: push to main always runs as a sanity check.

on:
  workflow_dispatch:

  push:
    branches: [main]

  pull_request:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'vendor/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/test.yml'

  pull_request_target:
    types: [labeled]

permissions:
  contents: read

jobs:
  test:
    # Gate: run when —
    #   (a) workflow_dispatch / push to main, OR
    #   (b) pull_request triggered by a path-matching diff, OR
    #   (c) pull_request_target with the `ci:full` label just added.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_target' && contains(github.event.pull_request.labels.*.name, 'ci:full'))

    # Windows is allowed to fail until tree-sitter CGO bindings are confirmed
    # on windows-latest — tracked in #937. Remove continue-on-error once #937
    # and its prerequisites (#926, #928) are resolved.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - run: go mod download

      - run: go vet ./...

      # gofmt check — only enforce on Linux to avoid CRLF noise from Windows
      # tooling. macOS and Linux share the same line endings in the repo so
      # running on ubuntu-latest is sufficient.
      - name: gofmt
        if: runner.os == 'Linux'
        shell: bash
        run: |
          diff=$(gofmt -l $(git ls-files '*.go' | grep -v '^vendor/') 2>&1)
          if [ -n "$diff" ]; then
            echo "Files need gofmt:"
            echo "$diff"
            exit 1
          fi

      - run: go build ./...

      # -timeout 15m: the suite with -race on a loaded CI runner (ubuntu-latest,
      # macos-latest) can take 8-10 minutes end-to-end. The previous 5m budget
      # was per-package but the cumulative wall-clock regularly exceeded it once
      # the extractor and daemon integration tests were added (see #2196). 15m
      # gives ~50% headroom over the observed worst-case while still catching
      # real deadlocks well before GitHub's 6-hour job limit.
      # Original rationale (#1797 / #937) still applies: a hard timeout is
      # better than the default 10-minute Go-level panic.
      - run: go test -race -count=1 -timeout 15m ./...
