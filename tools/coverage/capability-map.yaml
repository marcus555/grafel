# Capability-mapping file for the grafel coverage registry.
#
# Maps each registry capability cell to the code that implements it:
#   - symbols.file        the source file
#   - symbols.functions   the specific functions inside that file
#   - tests.file          the test file backing the capability
#   - issues_implemented  PR / issue numbers that landed the work
#   - verified_at         last manual cross-check date
#
# Validated by `go run ./tools/coverage validate` (see #2741 Phase 1).
# When a cited file or function no longer exists, validation fails.
#
# Shape mirrors registry.json: records.<id>.capabilities.<key> for flat
# records, records.<id>.capabilities.<group>.<key> for grouped records.
#
# This file is hand-curated and intentionally INCOMPLETE — entries land
# as the team writes them. The validator warns (not errors) when a
# full/partial registry cell lacks a mapping entry, so coverage grows
# incrementally without blocking unrelated work.

records:

  analysis.dependency-hygiene:
    capabilities:
      dependency_usage_status:
        # Pass 8.7 (engine.ApplyDependencyHygiene) reuses deplinker.Analyze
        # over the assembled graph.Document and persists usage_status=
        # used|unused onto each external_dependency entity + its DEPENDS_ON
        # edge. Promotes the previously dashboard-only deplinker signal into
        # the graph (issue #3640, epic #3625). Invoked from cmd/grafel/
        # index.go gated on --skip-pass=dep-hygiene.
        status: full
        symbols:
          - file: internal/engine/dependency_hygiene.go
            functions: [ApplyDependencyHygiene, depKey, depNameFromExternalRef, cutPrefix]
          - file: internal/extractors/cross/deplinker/extractor.go
            functions: [Analyze, analyzeEntities]
        tests:
          - file: internal/engine/dependency_hygiene_test.go
            functions: [TestApplyDependencyHygiene_UsedUnusedPhantom, TestApplyDependencyHygiene_GoModulePrefix, TestApplyDependencyHygiene_NoManifest, TestDepNameFromExternalRef]
        issues_implemented: ["3640"]
        verified_at: "2026-06-02"

  analysis.integration.third-party-sdk:
    capabilities:
      external_service_dependency:
        # #3628 area: SDK-LEVEL named third-party integration detection,
        # distinct from raw HTTP-client CONSUMES_API (path-level). Each
        # language extractor emits a DEPENDS_ON_SERVICE edge from the calling
        # function/method to a synthetic SCOPE.ExternalService node
        # (Name "service:<name>") so every call site of a service converges on
        # ONE node — answering "what third-party services does this codebase
        # integrate with, and where?". Shared dictionary + node/edge builders
        # in internal/extractor/external_service.go. PARTIAL: python +
        # javascript/typescript lanes only; precision-first import-gated
        # detection (dynamic boto3 -> aws-generic; non-SDK receiver -> no edge).
        # #5502 uplift: the shared service allow-list (ServiceForImportSource)
        # now covers the common TS SaaS SDKs — Stripe, Plaid, Knock, Postmark,
        # Slack, PostHog, Linear, HubSpot, Intercom, AWS (@aws-sdk/*),
        # UploadThing, Contentful, Mapbox, Cal.com, Vercel AI SDK (ai /
        # @ai-sdk/*) and OpenFeature (@openfeature/*) — via ONE table (no
        # per-SDK detector sprawl); the call-shape pass and convergence node are
        # unchanged. The recorded `operation` prefers the real SDK call
        # (stripe.charges.create -> charges.create) over the `new <Ctor>`
        # construction placeholder. Import gate preserved: a non-imported
        # `stripe`-named local emits no edge.
        status: partial
        symbols:
          - file: internal/extractor/external_service.go
            functions: [ServiceForImportSource, AWSServiceFromArg, ExternalServiceEntity, ExternalServiceTargetID, ExternalServiceName, EmitServiceDependencyEdges, IsAWSImportSentinel, isConstructorOp, findServiceRel]
          - file: internal/extractors/python/external_service.go
            functions: [emitServiceDependencyEdges, pyServiceCall, pyAttributeRootAndTail, pyAWSServiceFromCall]
          - file: internal/extractors/javascript/external_service.go
            functions: [emitServiceDependencyEdges, jsNewExpressionService, jsCallService, jsMemberRootAndTail, awsServiceFromCtorName]
        tests:
          - file: internal/extractor/external_service_test.go
            functions: [TestServiceForImportSource, TestAWSServiceFromArg, TestEmitServiceDependencyEdges_Converge, TestEmitServiceDependencyEdges_DropsSentinelAndEmpty]
          - file: internal/extractors/python/external_service_test.go
            functions: [TestPyService_Stripe, TestPyService_AWSS3FromLiteral, TestPyService_AWSDynamoResource, TestPyService_Convergence, TestPyService_TwilioConstructor, TestPyService_DynamicAWSArg_Generic, TestPyService_NonSDKReceiver_NoEdge, TestPyService_NoImport_NoEdge]
          - file: internal/extractors/javascript/external_service_test.go
            functions: [TestJSService_StripeConstructThenCall, TestJSService_SendGrid, TestJSService_AWSS3Client, TestJSService_SentryNamespaceInit, TestJSService_Convergence, TestJSService_NonSDKReceiver_NoEdge, TestTSService_Stripe]
