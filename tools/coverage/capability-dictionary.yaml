      - constraint_extraction
      - custom_validator_extraction
      - type_coercion_recognition
      - tests_linkage
    groups:
      - name: Schema
        keys: [schema_extraction, nested_model_extraction]
      - name: Constraints
        keys: [constraint_extraction, custom_validator_extraction]
      - name: Coercion
        keys: [type_coercion_recognition]
      - name: Testing
        keys: [tests_linkage]

  # Platform subcategories (#3628 child). The platform category was a
  # grab-bag rendering one 7-wide union pivot in which most cells were
  # "—". These lanes carve it into coherent groups whose per-capability
  # column sets only include the capabilities the lane's records actually
  # carry, so each pivot is dense. The iac vs resource-graph duplicate-
  # looking pairs (AWS CDK, Helm, Kubernetes, CloudFormation, Pulumi —
  # an infra.iac.* declarative record + an infra.resource.* attribution
  # record) are split across iac_provisioning vs app_topology so they no
  # longer sit adjacent as apparent duplicates. No group taxonomy: these
  # lanes render per-capability columns (the union machinery's don't-
  # strand guard is N/A — every declared column is used by ≥1 record).
  iac_provisioning:
    display: "IaC / Provisioning"
    parent_category: platform
    capabilities:
      - resource_extraction
      - dependency_attribution
      # iac_output_export_extraction (#4195): extraction of a stack/template's
      # published OUTPUTS / EXPORTS as first-class entities — the named values a
      # stack exposes for consumption by other stacks or callers. Backed by
      # CloudFormation `Outputs.<O>.Export.Name` producer nodes (cfn-export:*),
      # AWS CDK `CfnOutput(...)` config entities, Terraform/OpenTofu `output`
      # blocks (SCOPE.Schema/output), and Bicep `output` declarations.
      - iac_output_export_extraction
      # iac_cross_stack_reference (#4196): extraction of cross-stack / remote
      # references — a consuming stack reaching into another stack's published
      # state — as DEPENDS_ON edges or cross-stack join nodes. Backed by
      # Terraform/OpenTofu `data.terraform_remote_state.*` (cross_stack=true),
      # CloudFormation `!ImportValue` / `Fn::ImportValue` (collapsing onto the
      # shared cfn-export:* node), and Pulumi `StackReference` (pulumi-stack:*).
      - iac_cross_stack_reference
      # iac_iam_grant_attribution (#4197): attribution of IAM permission grants
      # between IaC resources — which principal/grantee resource is granted which
      # action on which target — modelled as a DEPENDS_ON edge grantee→target
      # carrying `reason=grant` and a `grant=<method>` property naming the exact
      # grant call. Backed by AWS CDK grant calls in cdk_edges.go (Pass 3): TS
      # `bucket.grantRead(fn)` (cdkGrantRe → emitDependsOn(grantee,res,"grant",
      # grantMethod), cdk_edges.go:367-377) and Python `data.grant_read(fn)`
      # (cdkPyGrantRe, cdk_edges.go:460-468). Other IaC tools (Terraform/OpenTofu,
      # CloudFormation, Pulumi, Bicep) extract IAM resources but emit only generic
      # dependency/resource edges with no grant-method attribution — honest N/A.
      - iac_iam_grant_attribution
      # iac_event_source_wiring (#4198): wiring of event sources / triggers to
      # compute resources — which event source (queue / stream / schedule /
      # topic / bucket-notification) invokes which function/consumer — modelled
      # as a typed edge linking the event source to the function it triggers.
      # Backed by AWS CDK in cdk_edges.go (Pass 4): TS `fn.addEventSource(new
      # SqsEventSource(queue))` (cdkAddEventSourceRe → emitDependsOn(fn,res,
      # "event_source",""), cdk_edges.go:381-388) and Python `fn.add_event_source(
      # SqsEventSource(queue))` (cdkPyAddEventSourceRe, cdk_edges.go:472-479), each
      # emitting a DEPENDS_ON edge fn→source carrying reason=event_source; and by
      # the Serverless Framework, whose parser reads each function's `events:` list
      # (parseEventsBlock) and emits a TRIGGERS edge source→function per
      # sqs/sns/stream/kinesis/schedule trigger carrying event_type=<kind>
      # (serverless_framework_edges.go:244-327). Other IaC tools (Terraform/
      # OpenTofu, CloudFormation, Pulumi, Bicep, Ansible) declare event sources as
      # generic resources (e.g. aws_lambda_event_source_mapping) with only ordinary
      # dependency/resource edges and no dedicated event-source-wiring edge or
      # trigger-type attribution — honest N/A.
      - iac_event_source_wiring
      # iac_environment_region_account (#4201): extraction of deployment
      # environment targeting — the cloud region / account / provider / stage /
      # runtime a resource or stack is deployed into — stamped as properties on
      # the emitted IaC entity (not merely a free-floating attribute). Backed by
      # the Serverless Framework, whose parser reads the `provider:` block's
      # runtime/region (parseProviderBlock, serverless_framework_parse.go:128-152)
      # and whose edge pass stamps provider=aws-lambda, runtime=<rt> and
      # region=<region> onto each lambda function entity's Properties
      # (serverless_framework_edges.go:144-158). Other IaC tools (Terraform/
      # OpenTofu, CloudFormation, CDK, Pulumi, Bicep, Ansible) do not stamp a
      # deployment region/account/runtime value as an environment-targeting
      # property: the hcl extractor records only the provider *name* label
      # (extractor.go:402-416) and the backend *type* (terraform_deep.go:367-372),
      # never the provider's region attribute or an account/runtime value, and the
      # remaining extractors emit no region/account/runtime property at all —
      # honest N/A.
      - iac_environment_region_account
      # iac_stack_app_topology (#4200): extraction of the stack / app / module
      # COMPOSITION hierarchy — which stacks/modules a deployment is composed of
      # (the topology entity: a Stack / App / Construct / module / nested-stack /
      # component node) and the parent/child or app→stack / stack→child / file→
      # module CONTAINMENT relationship between them. This is the STRUCTURAL
      # topology (what-contains-what), distinct from iac_cross_stack_reference
      # (one stack consuming another's published state) and from ordinary
      # resource dependency edges. Backed by:
      #   - AWS CDK: the rules YAML emits Stack / Construct / Stage / NestedStack
      #     classes as Component entities and `new cdk.App()` as a Config entity
      #     (aws_cdk.yaml source_patterns, javascript_typescript:39-58 / python:
      #     36-55) and the `new MyStack(app,'Id')` idiom as a CALLS containment
      #     edge app→stack (relationship_rules, javascript_typescript:61-67 /
      #     python:57-64) — the App-contains-Stack composition, both TS/JS and Py.
      #   - Terraform / OpenTofu: each `module "<name>"` block is emitted as a
      #     SCOPE.Component / subtype=module composition entity (extractModuleBlock,
      #     hcl/extractor.go:297-319) plus a file→module IMPORTS containment edge
      #     carrying import_kind=module + source_module (hcl/relationships.go:
      #     148-168) — the module-composition topology.
      #   - Bicep: each `module <name> '<path>.bicep'` declaration is emitted as a
      #     SCOPE.Component / subtype=module composition entity plus an IMPORTS
      #     containment edge to the referenced child .bicep module
      #     (extractModules, bicep/extractor.go:210-262) — module composition.
      #   - CloudFormation (partial): an `AWS::CloudFormation::Stack` resource is
      #     emitted as an entity plus an IMPORTS containment edge (nested_stack=
      #     true) to its child TemplateURL (iac_cloudformation_edges.go:559-565) —
      #     parent→child NESTED-stack containment only (no module-composition node
      #     for ordinary resources), so partial.
      #   - Pulumi (partial): each `class X extends/( pulumi.ComponentResource )`
      #     subclass is emitted as a component-scoped topology entity (resource_
      #     scope=component, the module boundary node) (applyPulumiEdges Pass 3,
      #     pulumi_edges.go:358-364 TS / 458-464 Py) — the composition entity is
      #     queryable, but no explicit ComponentResource→child containment edge is
      #     emitted, so partial.
      # Serverless Framework and Ansible emit no stack/app/module composition
      # hierarchy (a single `service` deployment unit / generic task entities with
      # no containment topology) — honest N/A.
      - iac_stack_app_topology
      # iac_resource_property_extraction (#4199): extraction of the TYPED
      # per-resource CONFIGURATION properties — the individual settings/arguments
      # of a provisioned resource (e.g. a Lambda's runtime / memory / timeout, an
      # EC2 instance_type, an env-var bag, the typed args/props/kwargs of a
      # construct or resource) STAMPED as scalar key→value pairs on the emitted
      # resource entity. This is distinct from identity (resource type / logical
      # id), from dependency (iac_*_reference / DEPENDS_ON edges) and from
      # topology (iac_stack_app_topology): it is the per-resource SETTINGS bag.
      # The bar for credit is that the extractor PROVABLY writes individual typed
      # configuration property values onto the resource entity's Properties /
      # Metadata map — NOT merely that it parses a props/args body to harvest
      # cross-resource references. Backed (only) by:
      #   - Bicep (partial): each `resource <name> '<type>@<api>' = {…}` is emitted
      #     with the typed property-bag fields it can read off the body stamped
      #     onto Metadata — the deployed `name:` property (reNameAttr →
      #     deployed_name) and the `@<apiVersion>` of the type (api_version), plus
      #     resource_category (extractResources, bicep/extractor.go:170-205). Two
      #     genuine typed property-bag values are stamped, but the broader bag
      #     (sku / location / kind / properties{…}) is not, so partial.
      #   - Serverless Framework (partial): each function is emitted with its typed
      #     function-config properties stamped — handler, runtime, region, service
      #     (parseProviderBlock + parseFunctionBody → fnProps, serverless_framework_
      #     edges.go:144-161) — genuine per-function settings on the entity, but
      #     memory / timeout / environment are not parsed/stamped, so partial.
      # NOT credited — these extractors emit the resource ENTITY (with its type /
      # logical-id / category) but do NOT stamp its individual typed config
      # property VALUES; their props/args/Properties bodies are scanned ONLY to
      # mine cross-resource references for DEPENDS_ON edges, discarding the scalar
      # settings — honest-missing, not partial:
      #   - AWS CDK: emitResource stamps only construct_type / logical_id /
      #     resource_category; the props/kwargs body (cdkConstructPropsRe Pass 5)
      #     yields only props_ref DEPENDS_ON edges, never a scalar prop value
      #     (cdk_edges.go:281-294, 391-409).
      #   - Terraform / OpenTofu: extractResourceBlock stamps resource_type / label
      #     / resource_category + iteration meta-args (count / for_each) only; the
      #     scalar block attributes (instance_type = "…", ami, …) are not stamped
      #     (hcl/extractor.go:206-249, terraform_deep.go:74-97).
      #   - CloudFormation: the resource entity carries resource_type / logical_id /
      #     resource_category; Resources[].Properties is mined only for Ref / GetAtt
      #     dependency edges, never stamped as typed props (iac_cloudformation_
      #     edges.go:507-520).
      #   - Pulumi: emitResource stamps construct_type / resource_category /
      #     logical_id; the args body is scanned only for output-ref DEPENDS_ON
      #     edges (pulumi_edges.go:242-254, 373-411).
      #   - Ansible: generic task entities with no typed resource property bag.
      - iac_resource_property_extraction
    groups: []

  container_orchestration:
    display: "Containers & Orchestration"
    parent_category: platform
