# Capability dictionary — single source of truth for the coverage tool's
# taxonomy (#2752). The `gen` and `validate` subcommands read this file
# at startup; helpers in capability_dictionary.go expose typed queries
# over it.
#
# Adding a new capability:
#   1. Append it to the `capabilities` list on the appropriate
#      subcategory (and the keys list of one of that subcategory's
#      groups, when the subcategory has a group taxonomy).
#   2. Re-run `go run ./tools/coverage validate` and `gen`.
#
# Zero Go code changes are required.

$schema_version: 1

# Universal core (#2940). These group names are the cross-framework lanes
# that count on every framework's by-language overview row. `order` fixes
# their left-to-right render order in the per-subcategory pivot; only the
# universal-core groups a subcategory actually declares are shown (omit-if-
# absent — we never fabricate a column). Any subcategory group whose name
# also appears here MUST be spelled identically (load-time consistency
# check in capability_dictionary.go + validate.go); that is why the
# http_backend auth lane is named "Auth" rather than "Security".
universal_core:
  order: [Routing, Auth, Type System, Testing, Substrate]

# Buckets group registry categories into the four rendering lanes used
# by summary.md and the per-language pages. Order governs display order
# across the registry.
buckets:
  Frameworks:
    order: 1
    categories: [http_framework, web_framework, nav_framework, rpc_framework, graphql]
  Tools:
    order: 2
    categories: [build_system, build_tool, package_manager, manifest, linter, formatter]
  ORMs:
    order: 3
    categories: [orm, query_builder, migration_tool]
  Other:
    order: 4
    categories: []

# Registry categories. Each category lists its category-wide capability
# keys (the flat allow-list used for records that opt out of the
# subcategory refinement). When a category supports subcategories, the
# `subcategory_order` slice fixes their render order.
categories:
  language:
    capabilities: [call_line_precision, discriminates_on, navigates_to, core_extraction, import_resolution_quality, db_effect, fs_effect, http_effect]
  http_framework:
    capabilities: [endpoint_synthesis, handler_attribution, auth_coverage, middleware_coverage]
    subcategory_order: [http_backend, jvm_backend, ui_frontend, meta_framework, mobile, desktop, rpc_framework, static_site, ai_integration, task_queue, resilience]
  orm:
    capabilities: [model_extraction, query_attribution, migration_parsing, migration_schema_ops]
    subcategory_order: [orm_mapper]
  message_broker:
    capabilities: [producer_extraction, consumer_extraction, topic_attribution, room_channel_grouping, signature_verification]
    subcategory_order: [schedulers, task_queues, brokers, realtime_channels, webhooks]
  observability:
    capabilities: [trace_extraction, metric_extraction, log_extraction]
  build_system:
    capabilities: [target_extraction, dependency_graph]
  package_manager:
    capabilities: [manifest_parsing, lockfile_parsing, dependency_usage_status]
  databases:
    capabilities: [resource_extraction, dependency_attribution]
  platform:
    capabilities: [resource_extraction, dependency_attribution, file_parsing, env_resolution, shared_data_coupling, external_service_dependency, translation_key_usage, iac_output_export_extraction, iac_cross_stack_reference, iac_iam_grant_attribution, iac_event_source_wiring, iac_environment_region_account, iac_stack_app_topology, iac_resource_property_extraction]
    subcategory_order: [iac_provisioning, container_orchestration, config_files, workflow_dag, app_topology, integration_external, localization, frontend_routing]
  security:
    capabilities: [auth_policy, secret_detection, sql_injection, cors_policy]
  protocol:
    capabilities: [service_extraction, method_attribution, cross_repo_linkage, schema_extraction, field_extraction]
  ci_cd:
    capabilities: [file_parsing, env_resolution]
  validation:
    capabilities: [schema_extraction, nested_model_extraction, constraint_extraction, custom_validator_extraction, type_coercion_recognition, tests_linkage]
    subcategory_order: [validation_lib]

# Subcategories carve a broad category into honest narrower lanes (e.g.
