domain_roots:
- layout: lapis_web_application
  description: 'Lapis web application running on OpenResty. Standard layout with MVC
    structure generated by `lapis new`.

    '
  roots:
  - app.lua
  - models/
  - views/
  - flows/
  - static/
  key_paths:
  - app.lua
  - config.lua
  - nginx.conf
  - models/
  - views/
  detection_combination:
  - lapis rockspec dep OR require('lapis') in app.lua
  - nginx.conf present
  - models/ OR views/ directory
- layout: openresty_nginx_service
  description: 'Raw OpenResty service without Lapis framework. nginx.conf drives all
    routing; Lua scripts handle request phases.

    '
  roots:
  - lua/
  - nginx/
  - conf/
  - logs/
  key_paths:
  - nginx.conf
  - lua/
  - conf/
  detection_combination:
  - nginx.conf with *_by_lua_* directives
  - lua/ directory with .lua files using ngx.* API
  - No app.lua / Lapis markers
- layout: love2d_game
  description: 'LOVE2D game project. Entry point is always main.lua with love.* callbacks.

    '
  roots:
  - main.lua
  - conf.lua
  - assets/
  - sounds/
  - images/
  key_paths:
  - main.lua
  - conf.lua
  detection_combination:
  - main.lua with love.load/love.update/love.draw functions
  - OR *.love archive file present
  - conf.lua optional
- layout: neovim_plugin
  description: 'Neovim plugin following the standard runtimepath layout. Distributed
    via lazy.nvim, packer.nvim, vim-plug, or manual cloning.

    '
  roots:
  - lua/
  - plugin/
  - doc/
  - tests/
  - spec/
  key_paths:
  - lua/
  - plugin/
  - doc/
  detection_combination:
  - lua/ directory with .lua files using vim.api.* or vim.fn.* calls
  - plugin/ directory with .vim or .lua autoload scripts
  - doc/ directory with *.txt vimdoc help files
- layout: solar2d_mobile_game
  description: 'Solar2D (Corona SDK) mobile game project. Entry point main.lua with
    display.* API calls and build.settings for platform targeting.

    '
  roots:
  - main.lua
  - scenes/
  - images/
  - sounds/
  - fonts/
  key_paths:
  - main.lua
  - build.settings
  - config.lua
  detection_combination:
  - main.lua with display.* or composer.* API calls
  - build.settings file present
  - No love.* API usage (distinguishes from LOVE2D)
- layout: luarocks_library
  description: 'Standalone Lua library distributed via LuaRocks. No framework, pure
    Lua module with a .rockspec file.

    '
  roots:
  - src/
  - lua/
  - lib/
  - spec/
  - '*.rockspec'
  key_paths:
  - '*.rockspec'
  - src/
  - lua/
  detection_combination:
  - .rockspec file present
  - src/ or lua/ directory containing .lua module files
  - spec/ or test/ directory with busted *_spec.lua tests
- layout: embedded_lua_scripts
  description: 'Standalone Lua scripts embedded in a larger project (e.g., shell scripts,
    CMake projects, game engines using Lua as scripting language). Lua is not the
    primary language of the project.

    '
  roots:
  - scripts/
  - lua/
  - config/
  key_paths:
  - '*.lua'
  detection_combination:
  - .lua files present but no *.rockspec, no main.lua with love.*, no app.lua with
    lapis, no vim.* globals
  - Often found alongside CMakeLists.txt, .sh scripts, or game engine files
