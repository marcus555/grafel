build_tools:
- name: LuaRocks
  config_files:
  - '*.rockspec'
  - luarocks.lock
  - .luarocks/
  - luarocks_config.lua
  description: 'LuaRocks is the package manager and build system for Lua. A .rockspec
    file defines a rock (package): its metadata, source location, build instructions,
    and dependencies. luarocks.lock pins exact dependency versions for reproducible
    installs (introduced in LuaRocks 3.3+). Every published Lua library has a .rockspec.
    Projects consuming libraries use luarocks install.

    '
  detection:
    required_files:
    - '*.rockspec'
    optional_files:
    - luarocks.lock
    - .luarocks/
    - luarocks_config.lua
    key_fields_in_rockspec:
    - package =
    - version =
    - source =
    - dependencies =
    - build =
    - description =
    - summary =
  rockspec_build_types:
  - builtin
  - make
  - cmake
  - command
  - none
  notes: 'The presence of a .rockspec file is the definitive signal that a project
    is distributed as a LuaRocks package. luarocks.lock is not universally present
    — many projects commit only the .rockspec. A rockspec with build.type = "builtin"
    means LuaRocks auto-detects the module structure from the source tree.

    '
- name: luarocks.lock (lockfile)
  config_files:
  - luarocks.lock
  description: 'luarocks.lock is the dependency lockfile generated by `luarocks install
    --lock`. Contains exact pinned versions of all direct and transitive dependencies
    as a Lua table literal. Analogous to package-lock.json or Gemfile.lock.

    '
  detection:
    required_files:
    - luarocks.lock
  notes: 'When luarocks.lock exists alongside a .rockspec, the project has opted for
    reproducible dependency resolution. Parse the lock table to enumerate all transitive
    dependencies and their versions.

    '
