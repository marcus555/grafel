skip_patterns:
- pattern: .cpcache/
  reason: 'Clojure tools.deps classpath cache. Contains cached classpath files, manifest
    data, and dependency resolution artifacts. Never index — machine-generated, not
    project source code.

    '
- pattern: target/
  reason: 'Leiningen and tools.build output directory. Contains compiled .class files,
    uberjar artifacts, AOT-compiled namespaces, and test results. Never index. Equivalent
    to Maven''s target/ directory.

    '
- pattern: .nrepl-port
  reason: 'File written by nREPL server containing the TCP port number when a REPL
    is running. Single-line file with a port integer. Not source code. Often gitignored
    but may appear in worktrees.

    '
- pattern: classes/
  reason: 'AOT (Ahead-Of-Time) compiled .class files generated by Clojure compiler.
    Binary bytecode, not source. Leiningen puts these under target/classes/; some
    projects configure a top-level classes/ directory.

    '
- pattern: checkouts/
  reason: 'Leiningen checkouts/ directory for local dependency development. Contains
    symlinks to local projects added as dependencies. Not the project''s own code.

    '
- pattern: .lein-repl-history
  reason: 'REPL command history file written by Leiningen. Not source code.

    '
- pattern: '*.jar'
  reason: 'Compiled Java archive files. Binary artifacts. Never index as source. May
    appear in lib/ or target/ directories.

    '
- pattern: resources/public/
  reason: 'Static web assets served by Ring (CSS, JS, images). For ClojureScript projects,
    compiled JS output lands here. Do not index compiled JS — index ClojureScript
    source in src/cljs/ instead.

    '
- pattern: .shadow-cljs/
  reason: 'shadow-cljs build cache and compiled output directory. Contains compiled
    ClojureScript JS artifacts, source maps, and build manifests. Never index.

    '
- pattern: node_modules/
  reason: 'NPM dependencies for ClojureScript projects using shadow-cljs. Not Clojure/ClojureScript
    project code. Always skip.

    '
- pattern: out/
  reason: 'ClojureScript cljsbuild output directory. Contains compiled JavaScript.
    Not source code. Common with lein-cljsbuild configuration targeting out/.

    '
- pattern: .clj-kondo/
  reason: 'clj-kondo linter cache and configuration exports. Contains type inference
    cache and analysis output. Not project source code.

    '
- pattern: .lsp/
  reason: 'clojure-lsp (Language Server Protocol) cache directory. Contains index
    data, classpath analysis, and navigation cache. Not project source.

    '
