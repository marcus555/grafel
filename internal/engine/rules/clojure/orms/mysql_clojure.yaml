orms_database:
  name: MySQL Clojure Drivers (next.jdbc, clojure.java.jdbc)
  category: relational_database
  deps_edn: com.github.seancorfield/next.jdbc
  detection:
    import_patterns:
    - next.jdbc
    - clojure.java.jdbc
    code_patterns:
    - :subprotocol "mysql"
    - :subprotocol 'mysql'
    - jdbc:mysql://
  notes: >
    Clojure MySQL access uses next.jdbc (modern) or clojure.java.jdbc (legacy)
    with MySQL Connector/J as the underlying JDBC driver. Detection relies on
    the :subprotocol "mysql" map key or jdbc:mysql:// URL.

file_conventions: []
source_patterns: []
relationship_rules: []

custom_extractors:
  - module: "memx_indexer.languages.mysql.mysql_extractor"
    function: "extract"
    description: >
      Cross-language MySQL extractor: driver connections
      (SCOPE.Service, INFERRED_FROM_MYSQL_DRIVER), stored procedure CALL
      (SCOPE.Operation/procedure, INFERRED_FROM_MYSQL_PROCEDURE), prepared
      statements (SCOPE.Operation/prepared, INFERRED_FROM_MYSQL_PREPARED),
      embedded SQL table extraction
      (SCOPE.Operation/query, INFERRED_FROM_MYSQL_QUERY).
