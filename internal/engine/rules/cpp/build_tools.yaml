build_tools:
- name: CMake
  config_files:
  - CMakeLists.txt
  - '*.cmake'
  - cmake/
  - CMakePresets.json
  - CMakeUserPresets.json
  structural_markers:
  - cmake_minimum_required(
  - project(
  - add_executable(
  - add_library(
  - target_link_libraries(
  - find_package(
  - include_directories(
  - target_include_directories(
  - set(CMAKE_
  - add_subdirectory(
  - install(
  - enable_testing()
  version_detection:
  - cmake_minimum_required(VERSION
  notes: 'De facto standard for cross-platform C++ build configuration. CMakeLists.txt
    in the project root is the primary signal. CMakePresets.json (CMake 3.19+) indicates
    modern workflow. Multiple CMakeLists.txt files indicate a multi-target project
    structure.

    '
- name: Make / GNU Make
  config_files:
  - Makefile
  - makefile
  - GNUmakefile
  - '*.mk'
  - '*.make'
  structural_markers:
  - CC =
  - CXX =
  - CFLAGS =
  - CXXFLAGS =
  - LDFLAGS =
  - '.PHONY:'
  - '$(CC) '
  - '$(CXX) '
  - '$(MAKE) '
  notes: 'Traditional Unix build tool. Standalone Makefile (not CMake-generated) indicates
    direct Make usage. CMake-generated Makefiles live in the build directory (CMakeFiles/)
    and are skippable.

    '
- name: Bazel
  config_files:
  - BUILD
  - BUILD.bazel
  - WORKSPACE
  - WORKSPACE.bazel
  - '*.bzl'
  - .bazelrc
  - .bazelversion
  - WORKSPACE.bzlmod
  - MODULE.bazel
  structural_markers:
  - cc_binary(
  - cc_library(
  - cc_test(
  - cc_import(
  - load("@rules_cc//
  - load("@com_github_grpc_grpc//
  - deps = [
  notes: 'Google-originated build system. WORKSPACE + BUILD files are definitive.
    MODULE.bazel indicates Bzlmod (modern dependency management, Bazel 6+). cc_binary/cc_library/cc_test
    are C/C++ rule markers. Often used in large monorepos and gRPC-heavy projects.

    '
- name: Meson
  config_files:
  - meson.build
  - meson_options.txt
  - meson.options
  - subprojects/
  structural_markers:
  - project(
  - executable(
  - library(
  - dependency(
  - subdir(
  - test(
  - import('cmake')
  - meson_options.txt
  notes: 'Modern build system with Python-like DSL. meson.build in root is the primary
    signal. subprojects/ directory indicates dependency wrapping. Increasingly adopted
    as CMake alternative in GNOME and system projects.

    '
- name: vcpkg
  config_files:
  - vcpkg.json
  - vcpkg-configuration.json
  - vcpkg_installed/
  structural_markers:
  - '"dependencies":'
  - '"name":'
  - '"version":'
  - '"version-string":'
  - '"features":'
  - '"builtin-baseline":'
  notes: 'Microsoft C++ package manager. vcpkg.json (manifest mode) is the primary
    signal. vcpkg-configuration.json indicates registry overrides. vcpkg_installed/
    directory is the installed packages output (skippable).

    '
- name: Conan
  config_files:
  - conanfile.txt
  - conanfile.py
  - conan_provider.cmake
  - conandeps_legacy.cmake
  structural_markers:
  - '[requires]'
  - '[generators]'
  - '[options]'
  - from conan import ConanFile
  - class.*ConanFile
  - def requirements(self)
  - self.requires(
  notes: 'C/C++ package manager popular in enterprise environments. conanfile.txt
    (simple) and conanfile.py (advanced, Python-based) are the detection targets.
    conanfile.py with ConanFile class is definitive. conan_provider.cmake integrates
    Conan with CMake.

    '
- name: Ninja
  config_files:
  - build.ninja
  - .ninja_deps
  - .ninja_log
  structural_markers:
  - rule CC
  - rule CXX
  - rule LINK
  - rule CUSTOM_COMMAND
  - 'build all:'
  notes: 'High-speed build executor. Standalone build.ninja rarely hand-authored —
    usually generated by CMake (-G Ninja) or Meson. Presence of build.ninja without
    CMakeLists.txt or meson.build may indicate a non-standard setup. .ninja_log and
    .ninja_deps are build artifacts (skippable).

    '
- name: Autotools (autoconf/automake)
  config_files:
  - configure.ac
  - configure.in
  - Makefile.am
  - autogen.sh
  - configure
  structural_markers:
  - AC_INIT(
  - AM_INIT_AUTOMAKE(
  - AC_PROG_CXX
  - AC_CONFIG_FILES(
  - AUTOMAKE_OPTIONS
  notes: 'Legacy GNU build system. configure.ac + Makefile.am are definitive. Generated
    configure script and Makefile.in are skippable (usually in .gitignore). Indicates
    older open-source library or POSIX-centric code.

    '
