frameworks:
  name: Flutter Desktop
  pubspec_dependency: flutter
  category: desktop
  detection:
    pubspec_signals:
    - 'sdk: flutter'
    structural_markers:
    - macos/
    - windows/
    - linux/
    - macos/Runner.xcodeproj/
    - windows/runner/
    - linux/CMakeLists.txt
    code_patterns:
    - Platform.isMacOS
    - Platform.isWindows
    - Platform.isLinux
    - defaultTargetPlatform == TargetPlatform.macOS
    notes: 'Flutter Desktop shares the Flutter SDK. Platform directories (macos/,
      windows/, linux/) are the primary disambiguating signals. A project may target
      multiple platforms simultaneously — check all three directories. linux/CMakeLists.txt
      is generated by flutter create with linux template.

      '

custom_extractors:
  - module: "archigraph.engine.rules.languages.dart.flutter_extractor"
    function: "extract"
    description: "Extract Flutter widgets, BLoC/Cubit/ChangeNotifier state management, Navigator routes, and GoRouter routes"
