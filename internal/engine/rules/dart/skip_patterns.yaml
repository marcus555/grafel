skip_patterns:
- pattern: .dart_tool/
  reason: 'Dart tooling metadata directory. Contains package_config.json, pub cache
    references, and build outputs. Entirely machine-generated. Never contains authored
    code.

    '
  action: skip entirely
- pattern: build/
  reason: 'Build output directory. Contains compiled artifacts, generated AOT snapshots,
    web build outputs (build/web/), and APK/IPA staging. No authored code.

    '
  action: skip entirely
- pattern: .flutter-plugins
  reason: 'Auto-generated Flutter plugin registry file at project root. Lists native
    plugin paths — generated by flutter pub get.

    '
  action: skip entirely
- pattern: .flutter-plugins-dependencies
  reason: 'Companion file to .flutter-plugins. JSON format listing plugin dependency
    graph. Generated by Flutter toolchain.

    '
  action: skip entirely
- pattern: generated_plugin_registrant.dart
  reason: 'Auto-generated Flutter plugin registrant (lib/generated_plugin_registrant.dart).
    Registers all native plugins. Do not index — pure boilerplate.

    '
  action: skip entirely
- pattern: '*.g.dart'
  reason: 'build_runner generated files: json_serializable, drift, floor, isar, hive_generator,
    mockito, injectable, retrofit. Always machine-produced. Indexing these creates
    duplicate and misleading entries.

    '
  action: skip entirely
- pattern: '*.freezed.dart'
  reason: 'Freezed code generator output. Immutable value class implementations, union
    type patterns, and copyWith/map/when methods. Machine-generated.

    '
  action: skip entirely
- pattern: '*.mocks.dart'
  reason: 'Mockito-generated mock classes. Auto-produced from @GenerateMocks annotations
    by build_runner. Test infrastructure, not authored logic.

    '
  action: scope=test, skip LLM enrichment
- pattern: '*.config.dart'
  reason: 'Injectable code generator output (get_it service locator registration).
    Machine-generated dependency injection configuration.

    '
  action: skip entirely
- pattern: lib/generated/
  reason: 'Common directory for generated assets (flutter_gen, intl generated ARB
    files, Serverpod generated models). All machine-produced.

    '
  action: skip entirely
- pattern: lib/l10n/app_*.dart
  reason: 'Flutter localization generated files from ARB sources (flutter gen-l10n).
    app_localizations.dart and app_localizations_*.dart are generated.

    '
  action: skip entirely
- pattern: ios/Pods/
  reason: 'CocoaPods dependency cache for iOS Flutter plugins. Third-party native
    code, not the project''s authored logic.

    '
  action: skip entirely
- pattern: android/.gradle/
  reason: 'Gradle build cache and metadata for Android Flutter target. Machine-generated
    build tooling state.

    '
  action: skip entirely
