domain_root_conventions:
  flutter_app_standard:
    description: 'Standard Flutter application layout generated by flutter create.
      Most Flutter projects follow this structure exactly.

      '
    directories:
    - path: lib/
      purpose: 'All Dart source code. The indexer''s primary domain root. Contains
        main.dart and all application logic.

        '
      entry_point: true
      index: true
    - path: lib/src/
      purpose: 'Optional subdirectory for non-public library code within lib/. Commonly
        used in larger projects for internal structure.

        '
      index: true
    - path: test/
      purpose: 'Unit and widget tests. Files end with _test.dart. Mirrors lib/ directory
        structure by convention.

        '
      scope: test
      index: true
    - path: integration_test/
      purpose: 'Integration tests run on real devices/emulators. Uses integration_test
        package (sdk: flutter).

        '
      scope: test
      index: true
    - path: android/app/src/main/kotlin/
      purpose: 'Kotlin Android platform code (method channel implementations, native
        plugins). Index only if project uses platform channels.

        '
      index: conditional
    - path: ios/Runner/
      purpose: 'Swift/Objective-C iOS platform code. Index only if project uses platform
        channels.

        '
      index: conditional
  dart_package_standard:
    description: 'Standard Dart package layout (pub.dev packages, shared libraries).
      No Flutter SDK dependency — pure Dart.

      '
    directories:
    - path: lib/
      purpose: 'Public API surface. lib/src/ contains internal implementation. lib/{package_name}.dart
        is the canonical export barrel.

        '
      entry_point: true
      index: true
    - path: lib/src/
      purpose: 'Private implementation. Only exported via lib/{package_name}.dart.
        Internal code not part of public API surface.

        '
      index: true
    - path: test/
      purpose: Unit tests. *_test.dart convention.
      scope: test
      index: true
    - path: example/
      purpose: 'Example app demonstrating package usage. Often a full Flutter or Dart
        app. Index at lower priority than lib/.

        '
      index: true
  dart_server_standard:
    description: 'Server-side Dart project layout (Shelf, dart_frog, Serverpod server
      component).

      '
    directories:
    - path: lib/
      purpose: Server application code, business logic, models.
      entry_point: false
      index: true
    - path: lib/src/
      purpose: Internal implementation modules.
      index: true
    - path: bin/
      purpose: 'Dart executable entry points. bin/server.dart or bin/main.dart is
        the conventional server entry point.

        '
      entry_point: true
      index: true
    - path: test/
      purpose: Unit and integration tests.
      scope: test
      index: true
    - path: routes/
      purpose: 'dart_frog only — file-system based route handlers. Each .dart file
        is a route (routes/index.dart → /).

        '
      index: true
      framework_specific: dart_frog
  serverpod_monorepo:
    description: 'Serverpod projects use a mandatory 3-package monorepo structure.

      '
    directories:
    - path: '{name}_server/lib/'
      purpose: 'Server-side Dart code: Endpoint implementations, business logic, protocol
        definitions. Primary backend code root.

        '
      entry_point: true
      index: true
    - path: '{name}_client/lib/'
      purpose: 'Auto-generated client library code. Created by Serverpod codegen.
        Index but mark as generated.

        '
      index: true
      generated: partial
    - path: '{name}_flutter/lib/'
      purpose: 'Flutter client app using the generated client library.

        '
      index: true
    - path: '{name}_server/lib/src/generated/'
      purpose: 'Serverpod-generated model serialization and protocol code. Machine-produced
        — skip entirely.

        '
      index: false
      action: skip entirely
