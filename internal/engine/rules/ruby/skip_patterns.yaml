skip_patterns:
- name: Rails schema
  paths:
  - db/schema.rb
  reason: 'Auto-generated by Rails from migration history. Always in sync with db/migrate/.
    Not authored code. Re-generated on db:schema:load.

    '
  check: null
- name: Rails routes (resource-only declarations)
  paths:
  - config/routes.rb
  reason: 'When config/routes.rb contains only resource declarations (resources :users,
    namespace :api), it is configuration, not domain logic. Skip unless it contains
    custom lambda constraints, redirect blocks, or non-trivial logic.

    '
  check: Scan for Proc/lambda/block bodies beyond simple resource/namespace declarations
- name: Rails initializer stubs
  paths:
  - config/initializers/*.rb
  reason: 'Most initializers are 1-5 line configuration stubs (e.g., Devise.setup,
    Sidekiq.configure_server). Skip unless the initializer contains non-trivial logic
    (class definitions, complex transformations, monkey-patches).

    '
  check: Skip if file is < 20 lines and contains only .configure/.setup blocks
- name: Empty ApplicationRecord subclasses
  paths:
  - app/models/application_record.rb
  reason: 'Rails 5+ generates ApplicationRecord < ActiveRecord::Base as an abstract
    base class. The generated version is always empty. Skip unless the project has
    added significant content to it.

    '
  check: Skip if body is only 'self.abstract_class = true' with no other methods
- name: Rails generated migration files
  paths:
  - db/migrate/*.rb
  reason: 'Migration files represent schema history, not domain logic. They should
    be indexed as infrastructure (scope=infra) rather than domain entities.

    '
  check: null
- name: Gemfile.lock
  paths:
  - Gemfile.lock
  reason: 'Machine-generated dependency lockfile. Contains resolved gem versions but
    no authored logic. Always skip for code indexing purposes.

    '
  check: null
- name: Bundler binstubs
  paths:
  - bin/bundle
  - bin/rails
  - bin/rake
  - bin/rspec
  - bin/setup
  - bin/update
  reason: 'Generated binstub scripts that wrap gem executables. bin/rails, bin/rake,
    and bin/bundle are always generated — skip unless bin/ contains custom authored
    scripts.

    '
  check: 'Skip files starting with #!/usr/bin/env ruby that contain only exec lines'
