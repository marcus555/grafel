orms_database:
  name: neo4rs (Neo4j Rust Driver)
  category: graph_database
  crate: neo4rs
  adoption_rank_2025: 1
  detection:
    cargo_toml_markers:
    - neo4rs
    import_patterns:
    - use neo4rs
    code_patterns:
    - Graph::new(
    - graph.run(
  notes: >
    Community Neo4j Rust driver (neo4rs). Uses Graph::new(config) for
    connection and graph.run(query!(...)...) for Cypher execution.

# ---------------------------------------------------------------------------
# Extraction schema
# ---------------------------------------------------------------------------

file_conventions: []
source_patterns: []
relationship_rules: []

custom_extractors:
  - module: "archigraph.engine.rules.languages.neo4j.neo4j_extractor"
    function: "extract"
    description: >
      Cross-language Neo4j extractor: driver connections via Graph::new
      (SCOPE.Service, INFERRED_FROM_NEO4J_DRIVER), Cypher queries
      (SCOPE.Operation/query, INFERRED_FROM_NEO4J_CYPHER).
