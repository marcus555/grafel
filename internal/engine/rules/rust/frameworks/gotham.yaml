frameworks:
  name: Gotham
  crate: gotham
  category: web_micro
  crates_io_version_2025: 0.7.x
  github_stars_2025: 2200+
  detection:
    cargo_toml_deps:
    - gotham
    import_markers:
    - 'use gotham::'
    structural_markers:
    - gotham::start(
    - 'gotham::router::builder::'
    - build_simple_router(
    - 'RouterBuilder::'
    - gotham::state::State
    notes: 'Type-safe framework with explicit state passing. Lower adoption but unique
      detection signals. Hyper-based, Tokio runtime.

      '
