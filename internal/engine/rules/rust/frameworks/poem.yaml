frameworks:
  name: Poem
  crate: poem
  category: web_full
  crates_io_version_2025: 3.x
  github_stars_2025: 3700+
  detection:
    cargo_toml_deps:
    - poem
    - poem-openapi
    import_markers:
    - 'use poem::'
    - 'use poem_openapi::'
    structural_markers:
    - '#[handler]'
    - poem::Route::new()
    - poem::Server::new(
    - 'poem::endpoint::'
    - '#[OpenApi]'
    - OpenApiService::new(
    notes: 'Full-featured framework with first-class OpenAPI support via poem-openapi.
      #[handler] attribute macro is a hard detection signal. Growing adoption for
      API-first services.

      '
