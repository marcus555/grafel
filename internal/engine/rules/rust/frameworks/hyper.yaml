frameworks:
  name: Hyper
  crate: hyper
  category: http_primitive
  crates_io_version_2025: 1.x
  github_stars_2025: 14300+
  detection:
    cargo_toml_deps:
    - hyper
    import_markers:
    - 'use hyper::'
    structural_markers:
    - hyper::Server
    - hyper::Client
    - hyper::Body
    - hyper::Request
    - hyper::Response
    - hyper::service::make_service_fn
    - hyper::service::service_fn
    notes: 'Low-level HTTP library. v1.x (2023+) is a breaking redesign. Most high-level
      frameworks (Axum, Warp) use hyper internally. Direct hyper usage signals a low-level
      HTTP service or reverse proxy.

      '
