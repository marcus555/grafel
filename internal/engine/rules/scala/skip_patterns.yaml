skip_patterns:
  build_output:
    directories:
    - target/
    - target/scala-*/
    - target/classes/
    - target/test-classes/
    - target/resolution-cache/
    - target/streams/
    reason: sbt build output — compiled classes, test classes, resolution cache
  bloop:
    directories:
    - .bloop/
    files:
    - .bloop/*.json
    reason: 'Bloop build server cache — generated server configuration files, not
      source code. Bloop is used by Metals (VS Code), IntelliJ, and other IDEs for
      fast compilation.

      '
  metals_and_ide:
    directories:
    - .metals/
    - .idea/
    - .idea_modules/
    files:
    - .metals/*.json
    - .scalafmt.conf (index as config, skip content analysis)
    - metals.sbt
    reason: 'Metals language server workspace data and IntelliJ project files. Not
      source code. metals.sbt in project/ is an auto-generated import file.

      '
  sbt_managed_sources:
    file_patterns:
    - '*_managed.scala'
    - '*_generated.scala'
    - '*.scala in target/scala-*/src_managed/'
    directories:
    - target/scala-*/src_managed/
    reason: 'sbt-managed sources generated by code generation plugins (protobuf, thrift,
      avro, twirl). Not hand-written code — indexing adds noise.

      '
  sbt_internal:
    directories:
    - project/project/
    - project/target/
    files:
    - project/project/build.properties
    reason: 'Meta-build (sbt building itself). project/project/ is sbt''s meta-project
      — not application code.

      '
  twirl_templates:
    file_patterns:
    - '*.html.scala'
    - '*.xml.scala'
    - '*.js.scala'
    - '*.txt.scala'
    directories:
    - target/scala-*/twirl/
    reason: 'Twirl template engine (Play Framework) compiles .html templates to .html.scala
      files in target/. These are generated — skip. Index the .html source files instead
      if needed.

      '
  worksheet_files:
    file_patterns:
    - '*.sc'
    reason: 'Scala worksheet files (.sc) are Ammonite scripts or Scala CLI worksheets.
      Context-dependent: index if in src/, skip if in scratch/ or tmp/. Worksheet
      output blocks (// res0: Int = 42) should be excluded.

      '
