orms_database:
  name: neotypes (Neo4j Scala Driver)
  category: graph_database
  sbt_dependency: "com.dimafeng %% neotypes-core"
  adoption_rank_2025: 1
  detection:
    build_sbt_markers:
    - neotypes
    import_patterns:
    - import neotypes
    code_patterns:
    - Driver[
    - DeferredQuery
  notes: >
    Community Neo4j Scala driver (neotypes). Functional, type-safe wrapper
    around the Java driver using cats-effect or monix.

# ---------------------------------------------------------------------------
# Extraction schema (MX-574)
# ---------------------------------------------------------------------------

file_conventions: []
source_patterns: []
relationship_rules: []

custom_extractors:
  - module: "memx_indexer.languages.neo4j.neo4j_extractor"
    function: "extract"
    description: >
      Cross-language Neo4j extractor: driver connections via Driver[F]
      (SCOPE.Service, INFERRED_FROM_NEO4J_DRIVER), Cypher queries
      (SCOPE.Operation/query, INFERRED_FROM_NEO4J_CYPHER).
