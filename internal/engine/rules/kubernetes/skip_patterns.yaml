skip_patterns:
- pattern: charts/*
  reason: 'Vendored Helm sub-chart dependencies directory. Contents are downloaded
    by helm dependency update and should not be indexed as project source. The chart
    tarballs (.tgz) and extracted chart directories within charts/ are third-party
    code. Index Chart.yaml at the parent level only.

    '
  match_type: directory_prefix
  scope: when charts/ is a subdirectory of a Helm chart directory
  examples:
  - myapp/charts/redis-18.0.0.tgz
  - myapp/charts/postgresql/
- pattern: kustomize build output
  reason: 'kustomize build renders all overlays into a single flat YAML stream. If
    this output is committed to a file (common in GitOps pipelines using ArgoCD or
    Flux), it is machine-generated and must not be indexed as source. Detect by presence
    of large YAML files with many --- separators and comments like "# Source: <chart>/templates/<file>.yaml".

    '
  match_type: content_pattern
  detection_heuristic:
  - '"# Source: <chart>/templates/" comment lines at document starts'
  - '> 50 YAML document separators (---) in a single file'
  examples:
  - rendered/all.yaml
  - dist/manifests.yaml
- pattern: '*.tgz in charts/ directories'
  reason: 'Helm chart tarballs. Binary files containing vendored chart archives. Never
    index.

    '
  match_type: filename_glob_in_directory
  directory: charts/
- pattern: cached manifests
  reason: 'Kustomize and Helm maintain local caches of downloaded remote bases and
    chart repositories. These are ephemeral machine-generated files.

    '
  match_type: directory_prefix
  examples:
  - .kube/cache/
  - ~/.cache/helm/
  - ~/.helm/repository/cache/
- pattern: test fixtures / golden files
  reason: 'Test fixture YAML files used in Helm chart tests (templates/tests/) or
    operator unit tests are not deployment manifests. Index only for test-scoped extraction,
    not as production entity definitions.

    '
  match_type: directory_pattern
  directories:
  - templates/tests/
  - testdata/
  - fixtures/
  - test/fixtures/
  - tests/fixtures/
  indexing_rule: 'Apply scope=test tag if indexed. Do not create production Service
    or ExternalAPI entities from test fixture manifests.

    '
- pattern: helm/charts/ generated lock and cache
  reason: 'Helm 2 local repository cache and chart index files are machine-generated
    tool artifacts.

    '
  examples:
  - .helm/repository/cache/*.yaml
  - .helm/repository/local/index.yaml
  match_type: directory_prefix
- pattern: generated CRD manifests from controller-gen
  reason: 'CRDs generated by controller-gen (Operator SDK, kubebuilder) from Go struct
    annotations are derived artifacts. Index the Go source structs instead. The generated
    CRD YAML is machine output.

    '
  match_type: content_pattern
  detection_heuristic:
  - '"# Code generated by controller-gen" comment at file top'
  - '"controller-gen.kubebuilder.io/version:" annotation on CRD'
- pattern: draft / template stubs
  reason: 'Helm starter charts and helm create output contain placeholder stub manifests
    with CHARTNAME, RELEASE-NAME template variables that have not been filled in.
    These are scaffolding artifacts.

    '
  match_type: content_pattern
  detection_heuristic:
  - '"CHARTNAME" literal string in manifest'
  - '"chart-name-placeholder" patterns'
