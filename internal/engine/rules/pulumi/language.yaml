meta:
  language: pulumi
  display_name: Pulumi
  extensions:
  - .py
  - .ts
  - .go
  - .cs
  - .java
  primary_dependency_file: Pulumi.yaml
  config_files:
  - Pulumi.yaml
  - Pulumi.*.yaml
  - Pulumi.*.json
  lock_files:
  - Pulumi.lock.json
  notes: 'Pulumi is an infrastructure as code (IaC) platform that uses general-purpose
    programming languages (TypeScript, Python, Go, C#, Java) instead of declarative
    DSLs. Code is written in the developer''s chosen language with the Pulumi SDK,
    compiled/executed, and deployed via the Pulumi CLI. Multi-cloud support (AWS,
    GCP, Azure, Kubernetes, etc.) through provider packages. Detection relies on Pulumi.yaml
    (project config), stack config files (Pulumi.*.yaml), and language-specific dependency
    markers (@pulumi/*, pulumi, etc.).

    '
