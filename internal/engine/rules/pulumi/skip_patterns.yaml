skip_patterns:
- pattern: .pulumi/
  reason: 'Pulumi working directory. Contains state files (history), secrets decryption
    keys, plugin cache, and project metadata. Machine-generated and sensitive. Never
    index.

    '
  match_type: directory_prefix
  examples:
  - .pulumi/history/
  - .pulumi/plugins/
  - .pulumi/stateKeys/
- pattern: Pulumi.*.yaml
  reason: 'Stack-specific configuration files. Override values from Pulumi.yaml for
    a given stack (dev, staging, prod). May contain sensitive values and secrets.
    Index stack file names only, not contents. Special handling: flag as configuration
    overrides for stack detection.

    '
  match_type: filename_glob
  special_handling: index_stack_names_only
  examples:
  - Pulumi.dev.yaml
  - Pulumi.prod.yaml
  - Pulumi.staging.json
- pattern: Pulumi.*.json
  reason: JSON variant of stack config. Same handling as *.yaml.
  match_type: filename_glob
  special_handling: index_stack_names_only
- pattern: Pulumi.lock.json
  reason: 'Provider version lock file (analogous to Terraform .terraform.lock.hcl).
    Records exact provider SDK versions for reproducibility. Machine-generated. Do
    not index.

    '
  match_type: filename_exact
- pattern: node_modules/
  reason: JavaScript/TypeScript dependency directory. Never index.
  match_type: directory_prefix
- pattern: venv/
  reason: Python virtual environment. Never index.
  match_type: directory_prefix
- pattern: .venv/
  reason: Hidden Python virtual environment. Never index.
  match_type: directory_prefix
- pattern: .dotnet/
  reason: C# build artifact cache. Never index.
  match_type: directory_prefix
- pattern: bin/
  reason: 'Language-specific build outputs (Go bin/, Java target/, etc.). Never index.

    '
  match_type: directory_prefix
- pattern: target/
  reason: Java Maven target directory. Never index.
  match_type: directory_prefix
- pattern: obj/
  reason: C# build output directory. Never index.
  match_type: directory_prefix
- pattern: .pulumi-config
  reason: Pulumi credential and config caching file. Never index.
  match_type: filename_exact
