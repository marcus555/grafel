frameworks:
  name: Pulumi
  vendor: Pulumi Corporation
  category: infrastructure_as_code
  current_version_2025: 3.x (latest 3.120+)
  registry: pkg.go.dev (Go), npm (JS/TS), PyPI (Python), NuGet (C#), Maven (Java)
  detection:
    config_files:
      - Pulumi.yaml
      - Pulumi.json
    content_patterns:
      - "import pulumi"
      - "import * as pulumi"
      - "using Pulumi;"
  notes: >-
    Pulumi is an IaC platform using general-purpose languages. Detected by
    Pulumi.yaml at project root and language-specific SDK imports.

# ---------------------------------------------------------------------------
# Extraction schema (FrameworkExtractionSchema — MX-526)
# ---------------------------------------------------------------------------

file_conventions:
  - glob: "Pulumi.yaml"
    entity_type: Config
    name_from: filename
  - glob: "Pulumi.*.yaml"
    entity_type: Config
    name_from: filename
  - glob: "__main__.py"
    entity_type: Config
    name_from: filename
  - glob: "index.ts"
    entity_type: Config
    name_from: filename
  - glob: "main.go"
    entity_type: Config
    name_from: filename

source_patterns:
  # Python resource: pulumi_aws.s3.Bucket("name", ...)
  - pattern: "pulumi_\\w+\\.(?:\\w+\\.)?(\\w+)\\s*\\("
    entity_type: Service
    name_group: 1
    scope: file
  # Python resource: aws.s3.Bucket("name", ...)
  - pattern: "(?:aws|azure|gcp|digitalocean|kubernetes)\\.(?:\\w+\\.)?(\\w+)\\s*\\("
    entity_type: Service
    name_group: 1
    scope: file
  # TypeScript resource: new aws.s3.Bucket("name", { ... })
  - pattern: "new\\s+(?:aws|azure|gcp|digitalocean|kubernetes)\\.(?:\\w+\\.)?(\\w+)\\s*\\("
    entity_type: Service
    name_group: 1
    scope: file
  # Go resource: s3.NewBucket(ctx, "name", ...)
  - pattern: "\\w+\\.New(\\w+)\\s*\\(\\s*ctx"
    entity_type: Service
    name_group: 1
    scope: file
  # pulumi.export("name", value) — stack output
  - pattern: "pulumi\\.(?:export|Export)\\s*\\(\\s*[\"']([^\"']+)[\"']"
    entity_type: Config
    name_group: 1
    scope: file
  # ComponentResource class (Python): class MyComponent(pulumi.ComponentResource)
  - pattern: "class\\s+(\\w+)\\s*\\(\\s*pulumi\\.ComponentResource\\s*\\)"
    entity_type: Component
    name_group: 1
    scope: class
  # ComponentResource class (TS): class MyComponent extends pulumi.ComponentResource
  - pattern: "class\\s+(\\w+)\\s+extends\\s+pulumi\\.ComponentResource\\b"
    entity_type: Component
    name_group: 1
    scope: class
  # Stack reference: pulumi.StackReference("org/project/stack")
  - pattern: "(?:pulumi\\.)?StackReference\\s*\\(\\s*[\"']([^\"']+)[\"']"
    entity_type: Dependency
    name_group: 1
    scope: file
  # Config: pulumi.Config("namespace")
  - pattern: "(?:pulumi\\.)?Config\\s*\\(\\s*[\"']([^\"']+)[\"']"
    entity_type: Config
    name_group: 1
    scope: file
  # Provider: new aws.Provider("name", ...)
  - pattern: "(?:new\\s+)?\\w+\\.Provider\\s*\\(\\s*[\"']([^\"']+)[\"']"
    entity_type: Config
    name_group: 1
    scope: file

relationship_rules:
  # StackReference creates cross-stack dependency
  - pattern: "(\\w+)\\s*=\\s*(?:pulumi\\.)?StackReference\\s*\\(\\s*[\"']([^\"']+)[\"']"
    source_type: Config
    target_type: Dependency
    relationship: CALLS
    source_group: 1
    target_group: 2
  # ComponentResource contains child resources
  - pattern: "class\\s+(\\w+)\\s*\\(\\s*pulumi\\.ComponentResource[\\s\\S]*?(?:aws|azure|gcp)\\.(?:\\w+\\.)?(\\w+)\\s*\\("
    source_type: Component
    target_type: Service
    relationship: CONFIGURES
    source_group: 1
    target_group: 2
