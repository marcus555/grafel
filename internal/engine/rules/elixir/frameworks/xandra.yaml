frameworks:
  name: xandra (Elixir Cassandra Driver)
  category: nosql_database
  hex_package: xandra
  detection:
    import_patterns:
    - Xandra
    - Xandra.Cluster
    code_patterns:
    - Xandra.start_link
    - Xandra.Cluster.start_link
    - Xandra.execute
  notes: >
    xandra (lexhide/xandra) is the primary Elixir Cassandra driver.
    Supports simple connections and cluster-aware connection pools.

file_conventions: []
source_patterns: []
relationship_rules: []

custom_extractors:
  - module: "archigraph.engine.rules.languages.cassandra.cassandra_extractor"
    function: "extract"
    description: >
      Cross-language Cassandra extractor: Xandra.start_link
      (SCOPE.Service, INFERRED_FROM_CASSANDRA_DRIVER), Xandra.execute
      (SCOPE.Operation/cql, INFERRED_FROM_CASSANDRA_CQL), prepared
      statements (SCOPE.Operation/prepared, INFERRED_FROM_CASSANDRA_PREPARED).
