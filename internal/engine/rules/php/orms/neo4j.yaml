orms_database:
  name: laudis/neo4j-php-client
  category: graph_database
  composer_package: laudis/neo4j-php-client
  adoption_rank_2025: 1
  detection:
    composer_json_markers:
    - laudis/neo4j-php-client
    import_patterns:
    - use Laudis\Neo4j
    code_patterns:
    - Client::create(
    - ClientBuilder::create(
  notes: >
    Community Neo4j PHP client library (laudis/neo4j-php-client). Uses
    Client::create() or ClientBuilder::create() for connection.

# ---------------------------------------------------------------------------
# Extraction schema
# ---------------------------------------------------------------------------

file_conventions: []
source_patterns: []
relationship_rules: []

custom_extractors:
  - module: "archigraph.engine.rules.languages.neo4j.neo4j_extractor"
    function: "extract"
    description: >
      Cross-language Neo4j extractor: driver connections via Client::create
      (SCOPE.Service, INFERRED_FROM_NEO4J_DRIVER), Cypher queries
      (SCOPE.Operation/query, INFERRED_FROM_NEO4J_CYPHER).
