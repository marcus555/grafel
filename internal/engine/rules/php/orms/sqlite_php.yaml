orms_database:
  name: PHP SQLite Drivers (PDO::sqlite / SQLite3 class)
  category: sqlite_driver
  detection:
    import_patterns: []
    code_patterns:
      - new PDO("sqlite:
      - new PDO('sqlite:
      - new SQLite3(
      - ":memory:"
  notes: >
    PHP provides two built-in SQLite interfaces: PDO with the sqlite driver
    (new PDO("sqlite:/path/db.sqlite")) and the SQLite3 class (new SQLite3("file.db")).
    Both are included in standard PHP builds. PDO is preferred for
    cross-database portability.

file_conventions: []
source_patterns: []
relationship_rules: []

custom_extractors:
  - module: "archigraph.engine.rules.languages.sqlite.sqlite_extractor"
    function: "extract"
    description: >
      Cross-language SQLite extractor: PDO::sqlite/SQLite3 connections
      (SCOPE.Service, INFERRED_FROM_SQLITE_DRIVER), WAL mode
      (SCOPE.Pattern, INFERRED_FROM_SQLITE_WAL), FTS virtual tables
      (SCOPE.Schema/fts, INFERRED_FROM_SQLITE_FTS). In-memory databases
      flagged with is_in_memory=true.
