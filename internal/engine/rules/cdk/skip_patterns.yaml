skip_patterns:
- pattern: cdk.out/
  reason: 'Generated CloudFormation artifacts directory. Contains JSON/YAML templates
    synthesized by `cdk synth`. Machine-generated, not source code. Never index.

    '
  match_type: directory_prefix
  examples:
  - cdk.out/MyStack.template.json
  - cdk.out/tree.json
- pattern: node_modules/
  reason: 'Installed npm dependencies. Not source code. Never index.

    '
  match_type: directory_prefix
- pattern: cdk.context.json
  reason: 'Context cache for CDK lookups (Availability Zones, latest AMI IDs, etc.).
    Machine-managed, not source. Skip by default.

    '
  match_type: filename_exact
  special_handling: optional_index_for_infrastructure_understanding
- pattern: .git/
  reason: Version control metadata. Skip.
  match_type: directory_prefix
- pattern: __pycache__/
  reason: Python bytecode cache. Skip.
  match_type: directory_prefix
- pattern: .pytest_cache/
  reason: Pytest cache. Skip.
  match_type: directory_prefix
- pattern: dist/
  reason: Build artifacts. Skip.
  match_type: directory_prefix
- pattern: build/
  reason: Build artifacts. Skip.
  match_type: directory_prefix
