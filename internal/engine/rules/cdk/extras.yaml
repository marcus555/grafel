detection_per_language:
- language: TypeScript
  file_extensions:
  - .ts
  primary_dependency_file: package.json
  detection_signals:
  - presence_of_cdk_lib: '"aws-cdk-lib" or "@aws-cdk/*" packages in package.json "dependencies"
      or "devDependencies" section.

      '
  - config_file: 'cdk.json at root. Example: { "app": "npx ts-node bin/app.ts" }'
  - class_patterns:
    - import { App, Stack } from "aws-cdk-lib";
    - import * as cdk from "aws-cdk-lib";
    - import { aws_s3, aws_lambda, ... } from "aws-cdk-lib";
    - export class MyStack extends cdk.Stack { constructor(...) { ... } }
  - example_package_json: "{\n  \"dependencies\": {\n    \"aws-cdk-lib\": \"^2.140.0\"\
      ,\n    \"constructs\": \"^10.0.0\"\n  },\n  \"devDependencies\": {\n    \"@aws-cdk/assert\"\
      : \"^2.140.0\",\n    \"typescript\": \"~5.0.0\"\n  }\n}\n"
  notes: 'TypeScript is the canonical CDK language. npm, pnpm, and Yarn are used for
    package management. cdk.json defines the entrypoint (typically bin/app.ts or lib/app.ts).
    The Stack subclass pattern is the primary detection anchor. aws-cdk-lib is the
    single package providing all L1, L2, and L3 constructs (consolidated in CDK v2).

    '
- language: Python
  file_extensions:
  - .py
  primary_dependency_file: requirements.txt (or requirements-dev.txt, pyproject.toml)
  detection_signals:
  - presence_of_cdk_lib: '"aws-cdk-lib" or "aws_cdk" in requirements.txt, requirements-dev.txt,
      or pyproject.toml [dependencies] section.

      '
  - config_file: 'cdk.json at root. Example: { "app": "python3 app.py" }'
  - class_patterns:
    - from aws_cdk import (core, aws_s3, aws_lambda, ...)
    - from aws_cdk.core import App, Stack
    - 'class MyStack(Stack):'
    - 'def __init__(self, scope: Construct, id: str, **kwargs):'
  - example_requirements_txt: 'aws-cdk-lib==2.140.0

      aws-cdk-core==2.140.0  # deprecated in v2, use aws-cdk-lib

      constructs>=10.0.0

      '
  - example_pyproject_toml: "[project]\ndependencies = [\n    \"aws-cdk-lib>=2.140.0\"\
      ,\n    \"constructs>=10.0.0\",\n]\n"
  notes: 'Python CDK uses pip/poetry for dependency management. aws-cdk-lib is the
    canonical package in v2; older v1 used separate aws-cdk-core, aws-cdk-s3, etc.
    (v1 is EOL). Stack subclass and App instantiation are the detection anchors. The
    cdk.json "app" entry typically points to a Python script (app.py or app/app.py).

    '
- language: Go
  file_extensions:
  - .go
  primary_dependency_file: go.mod
  detection_signals:
  - presence_of_cdk_lib: '''github.com/aws/aws-cdk-go/awscdk/v2'' in go.mod. Other
      imports: ''github.com/aws/constructs-go/constructs/v10''

      '
  - config_file: cdk.json at root
  - class_patterns:
    - import "github.com/aws/aws-cdk-go/awscdk/v2"
    - import "github.com/aws/aws-cdk-go/awscdk/v2/awss3"
    - type MyStack struct { awscdk.Stack }
    - func NewMyStack(scope awscdk.Construct, id string, ...) *MyStack
  - example_go_mod: "module example/cdk-app\n\nrequire (\n    github.com/aws/aws-cdk-go/awscdk/v2\
      \ v2.140.0\n    github.com/aws/constructs-go/constructs/v10 v10.0.0\n)\n"
  notes: 'Go CDK uses go.mod for dependency management. The aws-cdk-go package is
    split into language-specific submodules: awscdk (core), awscdk/v2/awss3, awscdk/v2/awslambda,
    etc. Stack struct embedding and NewMyStack factory functions are the detection
    patterns. Go CDK is the least mature (v2 only relatively recent), but is growing
    in adoption.

    '
- language: Java
  file_extensions:
  - .java
  primary_dependency_file: pom.xml (Maven) or build.gradle (Gradle)
  detection_signals:
  - presence_of_cdk_lib_maven: '"software.amazon.awscdk" artifact IDs in <dependency>
      blocks. Canonical: "software.amazon.awscdk:core", "software.amazon.awscdk:*".

      '
  - presence_of_cdk_lib_gradle: '''implementation "software.amazon.awscdk:core:2.140.0"''
      in build.gradle.

      '
  - config_file: cdk.json at root
  - class_patterns:
    - import software.amazon.awscdk.core.*;
    - import software.amazon.awscdk.services.s3.*;
    - public class MyStack extends Stack { ...
    - new Stack(app, "my-stack")
  - example_pom_xml: "<dependencies>\n  <dependency>\n    <groupId>software.amazon.awscdk</groupId>\n\
      \    <artifactId>core</artifactId>\n    <version>2.140.0</version>\n  </dependency>\n\
      \  <dependency>\n    <groupId>software.amazon.awscdk</groupId>\n    <artifactId>s3</artifactId>\n\
      \    <version>2.140.0</version>\n  </dependency>\n</dependencies>\n"
  - example_build_gradle: "dependencies {\n    implementation 'software.amazon.awscdk:core:2.140.0'\n\
      \    implementation 'software.amazon.awscdk:s3:2.140.0'\n}\n"
  notes: 'Java CDK uses Maven (pom.xml) or Gradle (build.gradle). Artifacts follow
    "software.amazon.awscdk:*" convention. Each service module is a separate artifact
    (core, s3, lambda, etc.). Stack class extension and App instantiation are the
    detection anchors. Java CDK is mature and widely used in enterprise environments.

    '
- language: C# (.NET)
  file_extensions:
  - .cs
  primary_dependency_file: '*.csproj or .csproj file'
  detection_signals:
  - presence_of_cdk_lib: '"Amazon.CDK.Lib" or "Amazon.CDK.Core" NuGet packages in
      *.csproj <PackageReference> tags or via dotnet add package.

      '
  - config_file: cdk.json at root
  - class_patterns:
    - using Amazon.CDK;
    - using Amazon.CDK.AWS.S3;
    - 'public class MyStack : Stack { public MyStack(...) { ... } }'
    - var app = new App();
    - new MyStack(app, "my-stack");
  - example_csproj: "<ItemGroup>\n  <PackageReference Include=\"Amazon.CDK.Lib\" Version=\"\
      2.140.0\" />\n  <PackageReference Include=\"Constructs\" Version=\"10.0.0\"\
      \ />\n</ItemGroup>\n"
  notes: 'C# CDK uses NuGet for package management. Canonical package is Amazon.CDK.Lib
    (consolidated in v2). Stack class and App root are the detection anchors. C# CDK
    is mature with strong .NET ecosystem integration.

    '
construct_to_scope_mapping:
- construct_name: s3.Bucket
  scope_value: Datastore
  construct_level: L2
  description: 'S3 bucket for object storage. L2 opinionated construct with sensible
    defaults (block public access, versioning, encryption options). Maps to AWS::S3::Bucket
    + related access control resources.

    '
  examples:
  - 'new s3.Bucket(this, ''MyBucket'', { versioned: true, ... })'
  - s3.Bucket(self, 'my_bucket', versioned=True)
  cfn_equivalent: aws_s3.CfnBucket
- construct_name: lambda.Function
  scope_value: Service
  construct_level: L2
  description: 'AWS Lambda function. L2 construct wrapping Lambda function + IAM role
    + environment variables. Stateless compute service.

    '
  examples:
  - 'new lambda.Function(this, ''Handler'', { code: Code.fromAsset(...) })'
  - lambda.Function(self, 'handler', code=Code.from_asset(...))
  cfn_equivalent: aws_lambda.CfnFunction
- construct_name: apigateway.RestApi
  scope_value: ExternalAPI
  construct_level: L2
  description: 'REST API Gateway for synchronous HTTP(S) endpoints. L2 construct managing
    API definition, stages, authorization, logging.

    '
  examples:
  - new apigateway.RestApi(this, 'MyApi', ...)
  - apigateway.RestApi(self, 'my_api', ...)
  cfn_equivalent: aws_apigateway.CfnRestApi
- construct_name: dynamodb.Table
  scope_value: Datastore
  construct_level: L2
  description: 'DynamoDB table for NoSQL key-value storage. L2 construct with partition
    key, sort key, billing mode (provisioned/on-demand), TTL, streams.

    '
  examples:
  - 'new dynamodb.Table(this, ''MyTable'', { partitionKey: { ... } })'
  - dynamodb.Table(self, 'my_table', partition_key=...)
  cfn_equivalent: aws_dynamodb.CfnTable
- construct_name: sqs.Queue
  scope_value: Queue
  construct_level: L2
  description: 'SQS queue for asynchronous message processing. L2 construct managing
    queue properties, visibility timeout, message retention, DLQ.

    '
  examples:
  - 'new sqs.Queue(this, ''MyQueue'', { visibilityTimeout: ... })'
  - sqs.Queue(self, 'my_queue', visibility_timeout=...)
  cfn_equivalent: aws_sqs.CfnQueue
- construct_name: sns.Topic
  scope_value: Event
  construct_level: L2
  description: 'SNS topic for publish-subscribe event distribution. L2 construct managing
    topic permissions, subscriptions, message attributes.

    '
  examples:
  - new sns.Topic(this, 'MyTopic', ...)
  - sns.Topic(self, 'my_topic', ...)
  cfn_equivalent: aws_sns.CfnTopic
- construct_name: ec2.Vpc
  scope_value: infrastructure
  construct_level: L2
  description: 'Virtual Private Cloud network isolation layer. L2 construct wrapping
    VPC, subnets, route tables, NAT gateways, and network topology.

    '
  examples:
  - 'new ec2.Vpc(this, ''MyVpc'', { cidrMask: 24, ... })'
  - ec2.Vpc(self, 'my_vpc', cidr_block='10.0.0.0/16')
  cfn_equivalent: aws_ec2.CfnVpc + CfnSubnet + ...
- construct_name: ecs.FargateService
  scope_value: Service
  construct_level: L2
  description: 'ECS Fargate service for container orchestration (serverless). L2 construct
    managing task definition, service, load balancer integration.

    '
  examples:
  - new ecs.FargateService(this, 'Service', { ... })
  - ecs.FargateService(self, 'service', ...)
  cfn_equivalent: aws_ecs.CfnService + CfnTaskDefinition
- construct_name: rds.DatabaseInstance
  scope_value: Datastore
  construct_level: L2
  description: 'RDS managed relational database (MySQL, PostgreSQL, Oracle, MSSQL).
    L2 construct managing engine, multi-AZ, backup, parameter groups.

    '
  examples:
  - 'new rds.DatabaseInstance(this, ''DB'', { engine: rds.DatabaseEngine.mysql80,
    ... })'
  - rds.DatabaseInstance(self, 'db', engine=rds.DatabaseEngine.mysql80, ...)
  cfn_equivalent: aws_rds.CfnDBInstance
- construct_name: cloudfront.Distribution
  scope_value: ExternalAPI
  construct_level: L2
  description: 'CloudFront CDN for edge caching and distribution. L2 construct managing
    origins, behaviors, caching policies, certificate association.

    '
  examples:
  - 'new cloudfront.Distribution(this, ''CDN'', { defaultBehavior: { ... } })'
  - cloudfront.Distribution(self, 'cdn', default_behavior=...)
  cfn_equivalent: aws_cloudfront.CfnDistribution
- construct_name: stepfunctions.StateMachine
  scope_value: Service
  construct_level: L2
  description: 'AWS Step Functions state machine for workflow orchestration. L2 construct
    managing states, transitions, error handling, retry logic.

    '
  examples:
  - 'new stepfunctions.StateMachine(this, ''SM'', { definition: ... })'
  - stepfunctions.StateMachine(self, 'sm', definition=...)
  cfn_equivalent: aws_stepfunctions.CfnStateMachine
- construct_name: events.Rule
  scope_value: Event
  construct_level: L2
  description: 'EventBridge rule for event-driven processing. L2 construct managing
    event patterns, targets (Lambda, SQS, SNS, Kinesis), dead-letter queues.

    '
  examples:
  - 'new events.Rule(this, ''MyRule'', { eventPattern: { ... } })'
  - events.Rule(self, 'my_rule', event_pattern=...)
  cfn_equivalent: aws_events.CfnRule
- construct_name: kms.Key
  scope_value: infrastructure
  construct_level: L2
  description: 'KMS encryption key for data protection. L2 construct managing key
    policy, key rotation, grants, alias.

    '
  examples:
  - 'new kms.Key(this, ''MyKey'', { enableKeyRotation: true })'
  - kms.Key(self, 'my_key', enable_key_rotation=True)
  cfn_equivalent: aws_kms.CfnKey
- construct_name: secretsmanager.Secret
  scope_value: infrastructure
  construct_level: L2
  description: 'Secrets Manager secret storage for credentials. L2 construct managing
    secret value, rotation, access policies, versions.

    '
  examples:
  - new secretsmanager.Secret(this, 'MySecret', { ... })
  - secretsmanager.Secret(self, 'my_secret', ...)
  cfn_equivalent: aws_secretsmanager.CfnSecret
structural_patterns:
- pattern_name: L1 (Cfn*) Constructs
  prefix: Cfn
  description: 'Low-level constructs representing raw CloudFormation resources. 1:1
    mapping to CloudFormation resource types. CfnBucket = AWS::S3::Bucket, CfnFunction
    = AWS::Lambda::Function, etc. Require explicit property configuration. No sensible
    defaults or convenience wrappers.

    '
  examples:
  - 'new s3.CfnBucket(this, ''MyBucket'', { bucketName: ''xyz'' })'
  - dynamodb.CfnTable(self, 'my_table', ...)
  use_case: 'Escape hatch for advanced/unsupported features. Should be rare in well-written
    CDK applications. High cognitive load — document why Cfn* was chosen over L2.

    '
  complexity_signal: Presence of Cfn* patterns indicates either cutting-edge or unsupported
    resource types, OR premature optimization/over-specification.
- pattern_name: L2 (Opinionated) Constructs
  prefix: None (PascalCase, e.g., Bucket, Function, Table)
  description: 'High-level, AWS-recommended constructs. Encode best practices: security
    defaults (block S3 public access), sensible timeouts, auto-scaling policies, logging
    integration. User API is simpler and less error-prone.

    '
  examples:
  - 'new s3.Bucket(this, ''MyBucket'', { blockPublicAccess: BlockPublicAccess.BLOCK_ALL
    })'
  - new lambda.Function(this, 'Handler', { ...})
  use_case: 'Primary choice for new infrastructure. 95% of applications use L2. Recommended
    AWS pattern.

    '
  complexity_signal: Pure L2 is lower complexity and more maintainable.
- pattern_name: L3 (Pattern) Constructs
  prefix: Pattern* or <Domain>* (e.g., ApplicationLoadBalancedFargateService)
  description: 'Composite constructs combining multiple L2 resources into a higher-level
    abstraction. Example: ApplicationLoadBalancedFargateService combines Fargate service
    + ALB + security groups + Auto Scaling in a single construct call. Patterns reduce
    boilerplate and encode architectural decisions.

    '
  examples:
  - new ecs_patterns.ApplicationLoadBalancedFargateService(this, 'Service', { ...
  - apigateway.LambdaRestApi(self, 'api', handler=lambda_function)
  use_case: 'Accelerate common scenarios. Reduce lines of code and conceptual complexity
    for standard topologies (web service + DB + cache).

    '
  complexity_signal: Patterns reduce explicit configuration but hide internal composition.
    Document what they create.
- pattern_name: Stack Class
  description: 'Root abstraction for a CDK deployment unit. Represents a CloudFormation
    stack. All resources (constructs) are defined as children of a Stack. App instantiates
    Stack(s). Stack defines scope, logical IDs, and outputs. Each Stack can be deployed
    independently.

    '
  examples:
  - export class MyStack extends Stack { constructor(scope, id, props) { ...
  - 'class MyStack(Stack): def __init__(self, scope, id, ...):'
  pattern_usage: 'Stack is the primary organizational boundary. Applications often
    define multiple Stack subclasses (one per logical unit: networking, compute, database)
    and instantiate them under a single App.

    '
- pattern_name: App Class
  description: 'Root construct container. Every CDK app has one App instance. App
    synthesizes the construct tree into a CloudFormation template (JSON/YAML). App
    is the entry point — created in bin/*.ts (TypeScript) or app.py (Python), instantiates
    Stack(s), and triggers synthesis.

    '
  examples:
  - const app = new cdk.App();
  - app = cdk.App()
  pattern_usage: 'Usually one App per CDK codebase. cdk.json "app" entry points to
    the App instantiation.

    '
extraction_targets:
- target_type: Stack Definition
  syntax: export class MyStack extends Stack { constructor(...) { ... } }
  extraction_fields:
  - stack_name
  - base_class
  - constructor_parameters
  - described_resources
  examples:
  - export class DatabaseStack extends Stack { constructor(scope, id, props) { const
    table = new dynamodb.Table(this, "MyTable", ...); } }
  notes: 'Stack definitions are the primary indexing unit. Extract stack name, properties,
    and the list of constructs it instantiates. Stack definitions define the infrastructure
    topology.

    '
- target_type: Construct Instantiation
  syntax: new s3.Bucket(this, "MyBucket", { ... })
  extraction_fields:
  - construct_class
  - construct_level
  - logical_id
  - key_properties:
    - all config properties passed to constructor
  examples:
  - 'new s3.Bucket(this, "LogBucket", { blockPublicAccess: BlockPublicAccess.BLOCK_ALL
    })'
  - 'new lambda.Function(this, "Handler", { code: Code.fromAsset("./handler"), handler:
    "index.handler" })'
  notes: 'Each construct instantiation is a resource being created. Extract the construct
    type, logical ID, and critical properties (e.g., handler function for Lambda,
    table key schema for DynamoDB). Properties define the resource configuration.

    '
- target_type: CfnOutput
  syntax: 'new CfnOutput(this, "VpcId", { value: vpc.vpcId })'
  extraction_fields:
  - output_key
  - output_value_expr
  - export_name
  examples:
  - 'new CfnOutput(this, "DatabaseEndpoint", { value: db.endpoint.address })'
  notes: 'CfnOutput blocks export values for cross-stack use or user visibility. Extract
    to understand the contract a Stack exposes. Outputs become CloudFormation outputs
    and can be imported by other stacks.

    '
- target_type: Props Interface
  syntax: interface MyStackProps extends StackProps { ... }
  extraction_fields:
  - interface_name
  - inherited_interfaces
  - properties:
    - property_name
    - property_type
    - required (boolean)
  examples:
  - 'interface MyStackProps extends StackProps { bucketName: string; enableEncryption:
    boolean; }'
  notes: 'Props interfaces define the configuration contract for Stack and custom
    Construct subclasses. Extract to understand parameterization and configuration
    options. Required vs optional properties are important for deployment scenarios.

    '
- target_type: Custom Construct Subclass
  syntax: export class MyConstruct extends Construct { constructor(...) { ... } }
  extraction_fields:
  - construct_class_name
  - parent_construct_class
  - public_properties
  - instantiated_children
  examples:
  - export class MyWebService extends Construct { constructor(scope, id, props) {
    this.lb = new elbv2.ApplicationLoadBalancer(...); this.service = new ecs.FargateService(...);
    } }
  notes: 'Custom Construct subclasses are internal abstractions and reusable components.
    Extract to understand modular architecture. Public properties are the interface.

    '
- target_type: Import/Dependency Declaration
  syntax: import { Bucket } from "aws-cdk-lib/aws-s3";
  extraction_fields:
  - imported_symbols
  - source_package
  - version
  examples:
  - import { App, Stack } from "aws-cdk-lib";
  - from aws_cdk import aws_s3, aws_lambda
  notes: 'Track imports to understand library versions and feature usage. Package.json/requirements.txt
    defines versions; imports show what''s actively used.

    '
domain_roots:
- layout: Standard TypeScript CDK Project
  description: 'Canonical single-module TypeScript CDK project structure with bin/
    (entrypoint), lib/ (Stack definitions), and test/ (unit tests).

    '
  root_paths:
  - bin/app.ts
  - lib/
  - lib/stacks/
  - lib/constructs/
  - test/
  - package.json
  - cdk.json
  priority_files:
  - cdk.json
  - bin/app.ts
  - lib/stacks/*.ts
  detection_signals:
  - cdk.json
  - import { App, Stack } from "aws-cdk-lib"
  - aws-cdk-lib in package.json
  notes: 'The bin/app.ts file instantiates the App and Stack(s). lib/ contains Stack
    subclasses. Index bin/app.ts first to understand the entry point, then traverse
    Stack definitions in lib/.

    '
- layout: Monorepo CDK Project (multiple stacks in separate dirs)
  description: 'Larger projects split into logical service domains. Each service has
    its own lib/ and Stack definitions. Shared constructs in lib/shared or a separate
    package.

    '
  root_paths:
  - bin/app.ts
  - lib/
  - services/
  - services/<service>/lib/
  - services/<service>/stack.ts
  - package.json
  - cdk.json
  priority_files:
  - cdk.json
  - bin/app.ts
  - services/*/stack.ts
  detection_signals:
  - services/ directory
  - multiple Stack subclasses
  notes: 'Monorepo style splits infrastructure by domain. Each service may have its
    own Stack. Shared constructs promote code reuse.

    '
- layout: Multi-Language CDK (Python)
  description: 'Python CDK project structure with app.py (entrypoint), stacks/ (Stack
    definitions), and tests/.

    '
  root_paths:
  - app.py
  - stacks/
  - tests/
  - requirements.txt
  - cdk.json
  priority_files:
  - cdk.json
  - app.py
  - stacks/*.py
  detection_signals:
  - cdk.json
  - from aws_cdk import core, aws_s3, ...
  - aws-cdk-lib in requirements.txt
  notes: 'Python CDK follows similar structure to TypeScript. app.py is the entrypoint.
    cdk.json "app" entry points to app.py (or similar).

    '
- layout: Go CDK Project
  description: 'Go CDK project with main.go (entrypoint), stacks/ (Stack definitions).

    '
  root_paths:
  - main.go
  - stacks/
  - go.mod
  - cdk.json
  priority_files:
  - cdk.json
  - main.go
  - stacks/*.go
  detection_signals:
  - cdk.json
  - github.com/aws/aws-cdk-go/awscdk/v2 in go.mod
  notes: 'Go CDK is structured similarly. main.go instantiates the App. go.mod declares
    aws-cdk-go dependency.

    '
