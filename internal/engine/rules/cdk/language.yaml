meta:
  language: cdk
  display_name: AWS CDK (Cloud Development Kit)
  extensions:
  - .ts
  - .py
  - .go
  - .java
  - .cs
  primary_dependency_file: package.json
  dependency_files:
  - package.json
  - requirements.txt
  - requirements-dev.txt
  - pyproject.toml
  - go.mod
  - pom.xml
  - build.gradle
  - '*.csproj'
  lock_files:
  - package-lock.json
  - pnpm-lock.yaml
  - yarn.lock
  config_files:
  - cdk.json
  notes: 'AWS CDK is an infrastructure-as-code framework using general-purpose languages
    (TypeScript, Python, Go, Java, C#) to define cloud infrastructure. CDK synthesizes
    to CloudFormation JSON/YAML. Detection relies on aws-cdk-lib (or language-specific
    package names) in dependency files, plus the presence of cdk.json at the root
    and CDK class imports. Construct Hub (constructs.dev) hosts L1, L2, and L3 constructs.
    L1 constructs (Cfn* prefix) are low-level CloudFormation escapes. L2 constructs
    are opinionated, high-level wrappers (e.g., s3.Bucket). L3 constructs are composable
    patterns combining multiple L2 resources.

    '
