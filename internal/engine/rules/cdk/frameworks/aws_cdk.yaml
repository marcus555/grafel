frameworks:
  name: AWS CDK
  vendor: Amazon Web Services
  category: infrastructure_as_code
  current_version_2025: 2.140.x
  registry: constructs.dev (construct hub), npmjs.com, PyPI, Maven Central
  detection:
    file_extensions:
      - .ts
      - .py
      - .go
      - .java
      - .cs
    config_files:
      - cdk.json
      - cdk.context.json
    content_patterns:
      - Stack
      - App
      - class.*Stack
  notes: >-
    AWS CDK is a multi-language IaC framework supporting TypeScript, Python,
    Go, Java, and C#. The App and Stack classes are the root abstractions.

# ---------------------------------------------------------------------------
# Extraction schema (FrameworkExtractionSchema —)
# ---------------------------------------------------------------------------

file_conventions:
  - glob: "lib/*.ts"
    entity_type: Component
    name_from: filename
  - glob: "lib/*.py"
    entity_type: Component
    name_from: filename
  - glob: "stacks/*.ts"
    entity_type: Component
    name_from: filename
  - glob: "stacks/*.py"
    entity_type: Component
    name_from: filename
  - glob: "cdk.json"
    entity_type: Config
    name_from: filename
  - glob: "cdk.context.json"
    entity_type: Config
    name_from: filename

source_patterns:
  # Stack class (TypeScript): class MyStack extends cdk.Stack
  - pattern: "class\\s+(\\w+)\\s+extends\\s+(?:cdk\\.)?Stack\\b"
    entity_type: Component
    name_group: 1
    scope: class
  # Stack class (Python): class MyStack(Stack)
  - pattern: "class\\s+(\\w+)\\s*\\(\\s*Stack\\s*\\)"
    entity_type: Component
    name_group: 1
    scope: class
  # App instantiation: new cdk.App() / App()
  - pattern: "new\\s+(?:cdk\\.)?App\\s*\\("
    entity_type: Config
    name_group: 0
    scope: file
  # Construct: new s3.Bucket / new lambda.Function / etc.
  - pattern: "new\\s+(?:\\w+\\.)?(Bucket|Function|Queue|Table|Topic|RestApi|Distribution|Cluster|Repository|LogGroup|Role|Policy)\\s*\\("
    entity_type: Service
    name_group: 1
    scope: class
  # Python CDK construct: s3.Bucket(self, ...)
  - pattern: "(?:aws_\\w+|s3|lambda_|sqs|dynamodb|sns|apigateway|cloudfront|ecs|ecr|logs|iam)\\.(Bucket|Function|Queue|Table|Topic|RestApi|Distribution|Cluster|Repository|LogGroup|Role|Policy)\\s*\\("
    entity_type: Service
    name_group: 1
    scope: class
  # CfnOutput: new cdk.CfnOutput(...)
  - pattern: "(?:new\\s+)?(?:cdk\\.)?CfnOutput\\s*\\(\\s*\\w+\\s*,\\s*[\"']([^\"']+)[\"']"
    entity_type: Config
    name_group: 1
    scope: class
  # Stack property/parameter
  - pattern: "(?:stack_name|stackName)\\s*[=:]\\s*[\"']([^\"']+)[\"']"
    entity_type: Config
    name_group: 1
    scope: class
  # L1 Cfn construct
  - pattern: "new\\s+(Cfn\\w+)\\s*\\("
    entity_type: Service
    name_group: 1
    scope: class

relationship_rules:
  # Stack contains constructs (new in stack scope)
  - pattern: "class\\s+(\\w+)\\s+extends\\s+(?:cdk\\.)?Stack[\\s\\S]*?new\\s+(?:\\w+\\.)?(\\w+)\\s*\\("
    source_type: Component
    target_type: Service
    relationship: CONFIGURES
    source_group: 1
    target_group: 2
  # App instantiates stacks: new MyStack(app, ...)
  - pattern: "new\\s+(\\w+Stack)\\s*\\(\\s*(\\w+)"
    source_type: Config
    target_type: Component
    relationship: CALLS
    source_group: 2
    target_group: 1
