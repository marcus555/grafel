skip_patterns:
  generated_go:
  - pattern: '*.pb.go'
    reason: 'Go protobuf generated file. Contains struct definitions, serialization
      methods, and field accessors. Not a source file — skip extraction.

      '
  - pattern: '*_grpc.pb.go'
    reason: 'Go gRPC generated stub file. Contains client/server interface and registration
      code. Not a source file — skip extraction.

      '
  - pattern: '*.pb.gw.go'
    reason: 'gRPC-Gateway generated HTTP reverse proxy file. Auto-generated — skip.

      '
  - pattern: '*.pb.validate.go'
    reason: 'protoc-gen-validate or protovalidate generated file. Skip extraction.

      '
  - pattern: '*.connect.go'
    reason: 'connect-go generated file. Auto-generated — skip extraction.

      '
  - pattern: '*.twirp.go'
    reason: 'Twirp generated handler file. Auto-generated — skip extraction.

      '
  generated_python:
  - pattern: '*_pb2.py'
    reason: 'Python protobuf generated message module. Auto-generated — skip.

      '
  - pattern: '*_pb2_grpc.py'
    reason: 'Python gRPC generated stub module. Auto-generated — skip.

      '
  - pattern: '*_pb2.pyi'
    reason: 'Python protobuf type stub. Auto-generated — skip.

      '
  generated_java:
  - pattern: '*.java (generated from protoc)'
    detection: src/main/java/**/*Proto.java or javax.annotation.Generated
    reason: 'Java protobuf generated classes. Skip — check for @javax.annotation.Generated
      or build/generated-sources/ path to confirm.

      '
  generated_javascript_typescript:
  - pattern: '*_pb.js'
    reason: Auto-generated JS protobuf message file — skip.
  - pattern: '*_pb.d.ts'
    reason: Auto-generated TS declaration file — skip.
  - pattern: '*_grpc_web_pb.js'
    reason: Auto-generated grpc-web client file — skip.
  - pattern: '*.pb.ts'
    reason: 'protoc-gen-es (Buf) generated TypeScript file — skip.

      '
  - pattern: '*.connect.ts'
    reason: 'connect-es (Buf) generated TypeScript client file — skip.

      '
  generated_ruby:
  - pattern: '*_pb.rb'
    reason: Auto-generated Ruby protobuf message file — skip.
  - pattern: '*_services_pb.rb'
    reason: Auto-generated Ruby gRPC service stub file — skip.
  generated_csharp:
  - pattern: '*.cs (from protoc)'
    detection: // <auto-generated> header or .pb.cs suffix
    reason: 'C# protobuf generated file. Check for // <auto-generated> header or look
      in obj/Debug/net*/Protos/ output directory.

      '
  empty_message_files:
  - pattern: '*.proto with zero service/message blocks'
    reason: 'Import-only .proto files that only declare imports and options with no
      message or service definitions. These act as re-export shims. Skip as extraction
      targets but record as import_only = true.

      '
  vendor_and_well_known:
  - pattern: vendor/google/protobuf/*.proto
    reason: 'Vendored well-known type definitions. These are copies of the official
      protobuf library — skip extraction.

      '
  - pattern: vendor/google/api/*.proto
    reason: Vendored googleapis annotations — skip extraction.
  - pattern: third_party/**/*.proto
    reason: 'Third-party proto definitions bundled for compilation. Skip extraction
      — index as dependency, not source.

      '
  - pattern: node_modules/**/*.proto
    reason: npm package vendored protos — skip extraction.
  lock_and_metadata:
  - pattern: buf.lock
    reason: Dependency lockfile — not a source file, skip extraction.
