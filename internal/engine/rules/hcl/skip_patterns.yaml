skip_patterns:
- pattern: .terraform/
  reason: 'Terraform initialisation directory. Contains downloaded provider plugins
    (binary executables), module cache, and backend configuration. Created by `terraform
    init`. Entirely machine-generated. Never index.

    '
  match_type: directory_prefix
  examples:
  - .terraform/providers/
  - .terraform/modules/
  - .terraform/terraform.tfstate
- pattern: .terraform.lock.hcl
  reason: 'Terraform provider lock file. Records exact provider versions and checksums
    for reproducibility. Machine-generated by `terraform init`. Not source code —
    do not index as HCL source. Commit to git but skip for code analysis.

    '
  match_type: filename_exact
- pattern: terraform.tfstate
  reason: 'Terraform state file. Contains the current known state of all managed infrastructure
    including sensitive attributes (secrets, passwords, keys). Never index. Remote
    state (S3, GCS, Terraform Cloud) is preferred; local state files are dev artifacts.

    '
  match_type: filename_exact
- pattern: terraform.tfstate.backup
  reason: 'Backup of the previous state file. Same sensitivity as terraform.tfstate.
    Never index.

    '
  match_type: filename_exact
- pattern: '*.tfstate'
  reason: 'Any Terraform state file regardless of name. Workspace-specific state files
    follow the pattern <workspace>.tfstate. All are sensitive infrastructure snapshots.
    Never index.

    '
  match_type: filename_glob
- pattern: '*.tfstate.backup'
  reason: State file backup — same as *.tfstate. Never index.
  match_type: filename_glob
- pattern: terraform.tfvars
  reason: 'Variable assignment file that often contains environment-specific or sensitive
    values. Index variable names (keys) only. Never extract or store values. Mark
    as potentially sensitive.

    '
  match_type: filename_exact
  special_handling: index_keys_only
- pattern: '*.auto.tfvars'
  reason: 'Auto-loaded variable files. Same sensitivity treatment as terraform.tfvars.
    Index variable names only.

    '
  match_type: filename_glob
  special_handling: index_keys_only
- pattern: .pkrvars.hcl
  reason: 'Packer variable files. May contain secrets (AMI owner IDs, region keys).
    Index variable names only, not values.

    '
  match_type: filename_suffix
  special_handling: index_keys_only
- pattern: crash.log
  reason: 'Terraform crash log. Written when Terraform panics. Plain text log file,
    not HCL. Never index.

    '
  match_type: filename_exact
