mobile:
  platform: iOS (Legacy Objective-C)
  category: legacy_ios
  notes: 'Legacy iOS development with UIKit is the dominant Objective-C mobile pattern.
    Objective-C iOS projects pre-date Swift (2014) and remain common in large enterprise
    and long-lived codebases. Detection combines file extension (.m/.mm), UIKit import,
    and AppDelegate pattern.

    '
  entry_point_signals:
  - 'AppDelegate.m — @interface AppDelegate : UIResponder <UIApplicationDelegate>'
  - main.m — UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate class]))
  - Info.plist — NSPrincipalClass or UIMainStoryboardFile keys
  structural_signals:
  - 'MVC layout: AppDelegate.m, *ViewController.m, *Model.m'
  - .storyboard files in Base.lproj/ (Interface Builder)
  - .xib files for individual view/cell layouts
  - '*.xcodeproj/ at project root'
  - '*.xcworkspace/ when CocoaPods or Carthage is used'
  - Podfile + Podfile.lock at project root (CocoaPods)
  - Cartfile + Cartfile.resolved at project root (Carthage)
  view_controller_patterns:
  - '@interface * : UIViewController'
  - '@interface * : UITableViewController'
  - '@interface * : UICollectionViewController'
  - '@interface * : UINavigationController'
  - '@interface * : UITabBarController'
  - '- (void)viewDidLoad'
  - '- (void)prepareForSegue:sender:'
  - '- (UITableViewCell *)tableView:cellForRowAtIndexPath:'
  - '- (void)collectionView:didSelectItemAtIndexPath:'
  dependency_management:
    cocoapods:
      detection_files:
      - Podfile
      - Podfile.lock
      - '*.xcworkspace/ (generated by CocoaPods)'
      - Pods/ directory
      config_patterns:
      - platform :ios, '<version>'
      - target '<TargetName>' do
      - pod '<LibraryName>'
      - pod '<LibraryName>', '~> <version>'
      - use_frameworks!
      notes: 'CocoaPods is the traditional package manager for iOS/macOS. Presence
        of Podfile indicates CocoaPods. The generated *.xcworkspace must be used instead
        of *.xcodeproj when CocoaPods is active. Pods/ directory contains vendored
        dependencies.

        '
    carthage:
      detection_files:
      - Cartfile
      - Cartfile.resolved
      - Carthage/Build/
      - Carthage/Checkouts/
      config_patterns:
      - github "<Owner>/<Repo>"
      - github "<Owner>/<Repo>" ~> <version>
      - binary "https://..."
      notes: 'Carthage is a decentralised dependency manager that builds frameworks
        without modifying the Xcode project. Cartfile at project root is the definitive
        signal. Carthage/Build/ contains prebuilt frameworks linked manually in Xcode.

        '
