skip_patterns:
- pattern: build/**/*.groovy
  reason: All files under build/ are Gradle-generated output
  examples:
  - build/generated-sources/
  - build/tmp/
  - build/classes/
- pattern: .gradle/**
  reason: Gradle cache and wrapper download directory — never source
  examples:
  - .gradle/caches/
  - .gradle/wrapper/
  - .gradle/daemon/
- pattern: BuildConfig.groovy
  reason: Grails 3+ auto-generated build config — not user-authored
  notes: 'In Grails 3+, BuildConfig.groovy is generated by the Grails CLI as a configuration
    artifact. It does not contain business logic. In Grails 2.x, BuildConfig.groovy
    IS user-authored — skip only if in build/ or generated directories. Use grails-app/conf/application.yml
    presence to distinguish Grails 3+ from 2.x.

    '
- pattern: grails-app/conf/spring/resources.groovy
  reason: Auto-generated Spring bean config stub — usually empty
  notes: 'resources.groovy is generated by Grails CLI with an empty beans { } closure.
    Skip if file contains only the boilerplate comment and empty beans block. Index
    if it contains actual bean definitions.

    '
- pattern: target/**
  reason: Maven build output directory — not source
  examples:
  - target/classes/
  - target/generated-sources/
- pattern: '**/*_closure*.class'
  reason: Groovy closure class files (compiled, not source)
- pattern: src/main/generated/**
  reason: Code generation output directory
- pattern: grails-app/conf/BootStrap.groovy
  reason: Framework lifecycle hook — not indexable as domain logic
  notes: 'BootStrap.groovy contains init { } and destroy { } lifecycle methods for
    Grails application startup/shutdown. It is framework boilerplate unless it contains
    significant domain seeding logic (check for more than 10 lines of non-trivial
    code before skipping).

    '
- pattern: grails-app/conf/DataSource.groovy
  reason: Grails 2.x data source config — generated pattern, no business logic
  notes: 'DataSource.groovy is configuration only (JDBC URL, username, password).
    Never contains business logic. Grails 3+ uses application.yml for datasource config
    — DataSource.groovy presence signals a Grails 2.x project.

    '
- pattern: gradle/wrapper/**
  reason: Gradle Wrapper scripts and JAR — not source code
  examples:
  - gradle/wrapper/gradle-wrapper.jar
  - gradle/wrapper/gradle-wrapper.properties
- pattern: '**/*.groovyc'
  reason: Compiled Groovy class files — not source
