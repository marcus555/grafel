skip_patterns:
- pattern: zig-cache/
  reason: 'Zig''s local build cache. Contains compiled objects, generated code, hash-addressed
    artifacts, and downloaded package source trees. Created by `zig build` in the
    project root. Never index.

    '
  match_type: directory_prefix
  examples:
  - zig-cache/o/
  - zig-cache/h/
  - zig-cache/p/
  - zig-cache/tmp/
- pattern: zig-out/
  reason: 'Default output directory for `zig build install`. Contains compiled binaries
    (zig-out/bin/), libraries (zig-out/lib/), and headers (zig-out/include/). Machine-generated
    artifacts, not source.

    '
  match_type: directory_prefix
  examples:
  - zig-out/bin/
  - zig-out/lib/
  - zig-out/include/
- pattern: .zig-cache/
  reason: 'Alternative hidden cache directory name used in some Zig versions and CI
    environments. Same content as zig-cache/.

    '
  match_type: directory_prefix
- pattern: '*.zig.zon.lock'
  reason: 'Lock file for build.zig.zon dependencies (if generated by tooling). Machine-generated
    dependency resolution artifact.

    '
  match_type: filename_glob
- pattern: generated/
  reason: 'Convention directory for generated Zig source (e.g., from zig-openapi,
    code generators, or @embedFile artifacts). Not human-authored source.

    '
  match_type: directory_prefix
  exception: 'May contain generated type-safe API clients worth indexing if explicitly
    configured. Default: skip.

    '
- pattern: docs/
  reason: 'Zig stdlib documentation is auto-generated by `zig build-lib --emit-docs`
    into docs/ as HTML + JSON. Not source code.

    '
  match_type: directory_prefix
  exception: 'Hand-written docs in docs/ (markdown, .zig examples) should be indexed
    if the directory contains .zig files not beginning with `// THIS FILE IS GENERATED`.

    '
- pattern: vendor/
  reason: 'Some Zig projects vendor C dependencies directly (SQLite amalgamation,
    miniz, stb_*). These are third-party C sources, not project source code.

    '
  match_type: directory_prefix
  exception: 'Vendor C headers (.h files) may be indexed as interface discovery for
    @cImport pattern resolution.

    '
