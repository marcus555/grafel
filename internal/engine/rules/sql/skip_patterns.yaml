skip_patterns:
- pattern: V{timestamp}__{description}.sql (Flyway auto-generated)
  description: 'Flyway auto-generated migration with timestamp version prefix.

    '
  match_conditions:
  - File matches V[0-9]{8,}__*.sql pattern
  - 'Contains only boilerplate: CREATE TABLE, INSERT with no logic'
  - No stored procedures, views, or complex queries
  rationale: 'Pure schema snapshots or simple auto-generated DDL migrations have no
    unique business logic to index. The schema structure is captured by the CREATE
    TABLE entities themselves.

    '
  action: scope=migration, skip LLM enrichment
- pattern: schema_dump.sql / schema.sql (database dump files)
  description: 'Full database schema dumps or exports generated by pg_dump, mysqldump,
    or similar tools.

    '
  match_conditions:
  - 'File contains pg_dump header comment: -- PostgreSQL database dump'
  - 'File contains mysqldump header: -- MySQL dump'
  - File name is schema.sql or structure.sql or dump.sql
  - File size exceeds 500KB
  rationale: 'Schema dumps are auto-generated snapshots of the full database state.
    They contain all tables, indexes, sequences, and permissions — not authored migration
    logic. Indexing dumps produces noise and duplicates entities already captured
    by migration files.

    '
  action: skip entirely
- pattern: seed_data.sql / fixtures.sql (seed data files)
  description: 'SQL files containing only INSERT statements for test or seed data.

    '
  match_conditions:
  - File contains only INSERT INTO statements
  - No DDL statements (CREATE, ALTER, DROP)
  - No procedural logic
  - 'File name matches: seed*.sql, fixture*.sql, data*.sql, sample*.sql'
  rationale: 'Seed data files are data payloads, not schema or logic. INSERT-only
    files have no indexable code entities.

    '
  action: skip entirely
- pattern: Alembic auto-generated migrations (timestamp prefix)
  description: 'Alembic migration files auto-generated by alembic revision --autogenerate.

    '
  match_conditions:
  - File in alembic/versions/ directory
  - 'Contains # revision identifiers comment block'
  - Contains revision = and down_revision = variables
  - Contains only op.create_table / op.add_column / op.drop_* calls
  rationale: 'Autogenerated Alembic migrations are mechanical diffs with no authored
    logic. Manually authored migrations (with custom upgrade() logic beyond simple
    op.* calls) should be indexed.

    '
  action: scope=migration, skip LLM enrichment
- pattern: Generated schema snapshots from ORMs
  description: 'ORM-generated schema files that reflect model state, not authored
    SQL.

    '
  match_conditions:
  - Rails db/schema.rb equivalent SQL export
  - Django migration 0001_initial.py converted to SQL
  - Prisma migration.sql auto-generated from schema.prisma
  rationale: 'ORM-generated SQL is a derivative of the ORM model definitions. The
    source of truth is the ORM model, not the generated SQL.

    '
  action: skip entirely
- pattern: Test fixture SQL in test directories
  description: 'SQL INSERT statements used as test setup/teardown data.

    '
  match_conditions:
  - File in test/, tests/, spec/ directories
  - Contains only INSERT and SELECT statements
  - No DDL or procedural code
  rationale: 'Test data setup scripts are not indexable logic entities.

    '
  action: scope=test, skip LLM enrichment
- pattern: Generated migration checksums and lock files
  description: 'Atlas atlas.sum, Liquibase lock tables, Flyway history tables.

    '
  match_conditions:
  - File name is atlas.sum
  - File contains only hash values
  rationale: 'Checksum files are machine-generated integrity tracking data. No logic
    to index.

    '
  action: skip entirely
