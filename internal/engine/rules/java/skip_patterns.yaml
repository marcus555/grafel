skip_patterns:
- name: lombok_generated
  description: Lombok annotation-generated bytecode (no .java source to index)
  patterns:
  - lombok.javac.apt.LombokProcessor
  file_patterns:
  - '**/*.class'
  notes: 'Lombok generates code at compile time — there is no source file to skip.
    However, skip @lombok.Data, @lombok.Builder, @lombok.AllArgsConstructor heavy
    files from LLM enrichment (getter/setter noise). Source files with @Data + @Builder
    + @AllArgsConstructor have low novel content.

    '
- name: mapstruct_generated
  description: MapStruct-generated mapper implementation files
  patterns:
  - javax.annotation.processing.Generated
  - '@Generated'
  - mapstruct
  file_patterns:
  - '*MapperImpl.java'
  - '*Mapper_.java'
  notes: 'MapStruct generates *MapperImpl.java implementation files at compile time.
    These are boilerplate — skip from indexing. Detect by @Generated annotation with
    mapstruct comment or *MapperImpl.java filename.

    '
- name: jpa_metamodel
  description: JPA static metamodel generated files (criteria API type safety)
  file_patterns:
  - '*_.java'
  notes: 'JPA metamodel generation produces *_.java files (e.g., Customer_.java for
    Customer entity). These are entirely generated — skip from indexing.

    '
- name: package_info
  description: Package-level annotation and Javadoc declarations
  file_patterns:
  - package-info.java
  notes: 'package-info.java contains only package declaration and package-level annotations/Javadoc.
    No useful entity signals. Skip.

    '
- name: module_info
  description: Java 9+ module descriptor
  file_patterns:
  - module-info.java
  notes: 'module-info.java declares module dependencies and exports. Skip from entity
    extraction — module graph is not a code entity.

    '
- name: android_r_generated
  description: Android auto-generated resource ID class
  file_patterns:
  - R.java
  - R2.java
  - '**/BuildConfig.java'
  notes: 'R.java is entirely auto-generated by AAPT2. R2.java is generated by ButterKnife.
    BuildConfig.java is Gradle-generated. All are skip targets.

    '
- name: build_output
  description: Compiled output directories
  directory_patterns:
  - target/
  - build/
  - out/
  - .gradle/
  - bin/
  - .idea/
  notes: 'Standard build output directories. Never index files in these locations.

    '
