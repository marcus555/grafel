orms_database:
  name: AWS DynamoDB Java SDK / Spring Data DynamoDB / DynamoDB Enhanced Client
  category: nosql_database
  maven_coordinates: software.amazon.awssdk:dynamodb
  gradle_dependency: implementation 'software.amazon.awssdk:dynamodb'
  detection:
    pom_xml_markers:
    - aws-java-sdk-dynamodb
    - software.amazon.awssdk:dynamodb
    - software.amazon.awssdk:dynamodb-enhanced
    import_patterns:
    - import com.amazonaws.services.dynamodbv2
    - import software.amazon.awssdk.services.dynamodb
    - import com.amazonaws.services.dynamodbv2.datamodeling
    code_patterns:
    - AmazonDynamoDB
    - DynamoDbClient
    - '@DynamoDBTable'
    - '@DynamoDbBean'
    - DynamoDbEnhancedClient
    - AmazonDynamoDBClientBuilder
  notes: >
    AWS SDK v1 (com.amazonaws) and v2 (software.amazon.awssdk) plus the
    DynamoDB Enhanced Client (@DynamoDbBean, DynamoDbTable<T>) are all
    gated to this extractor. Kotlin shares via the language gate.

file_conventions: []
source_patterns: []
relationship_rules: []

custom_extractors:
  - module: "memx_indexer.languages.dynamodb.dynamodb_extractor"
    function: "extract"
    description: >
      Cross-language DynamoDB extractor: client connections (SCOPE.Service,
      INFERRED_FROM_DYNAMODB_CLIENT), table definitions @DynamoDBTable
      (SCOPE.Schema, INFERRED_FROM_DYNAMODB_TABLE), GSI/LSI indexes
      (SCOPE.Schema, INFERRED_FROM_DYNAMODB_INDEX), query/scan operations
      (SCOPE.Operation/query, INFERRED_FROM_DYNAMODB_QUERY), streams
      (SCOPE.Operation/stream_op, INFERRED_FROM_DYNAMODB_STREAM), DAX
      (SCOPE.Service, INFERRED_FROM_DYNAMODB_DAX), single-table design
      (SCOPE.Pattern, INFERRED_FROM_DYNAMODB_SINGLE_TABLE), Enhanced Client
      @DynamoDbBean (SCOPE.Schema, INFERRED_FROM_DYNAMODB_ENHANCED).
