orms_database:
  name: Neo4j Java Driver / Spring Data Neo4j / Neo4j OGM
  category: graph_database
  maven_coordinates: org.neo4j.driver:neo4j-java-driver
  adoption_rank_2025: 1
  detection:
    pom_xml_markers:
    - neo4j-java-driver
    - spring-data-neo4j
    - neo4j-ogm-core
    - org.neo4j
    gradle_markers:
    - neo4j-java-driver
    - spring-data-neo4j
    - neo4j-ogm
    import_patterns:
    - import org.neo4j.driver
    - import org.springframework.data.neo4j
    - import org.neo4j.ogm
    code_patterns:
    - GraphDatabase.driver(
    - '@Node'
    - '@Relationship'
    - '@NodeEntity'
    - '@RelationshipEntity'
    - Neo4jRepository
    - SessionFactory
  notes: >
    Official Neo4j Java driver plus Spring Data Neo4j (SDN) and Neo4j OGM
    are all gated to this extractor. Kotlin shares this extractor via the
    language gate.

# ---------------------------------------------------------------------------
# Extraction schema (MX-574)
# ---------------------------------------------------------------------------

file_conventions: []
source_patterns: []
relationship_rules: []

custom_extractors:
  - module: "archigraph.engine.rules.languages.neo4j.neo4j_extractor"
    function: "extract"
    description: >
      Cross-language Neo4j extractor: driver connections (SCOPE.Service,
      INFERRED_FROM_NEO4J_DRIVER), Cypher query strings (SCOPE.Operation/query,
      INFERRED_FROM_NEO4J_CYPHER) with node labels and relationship types,
      Spring Data Neo4j @Node/@Relationship (SCOPE.Schema,
      INFERRED_FROM_NEO4J_SDN), Neo4j OGM @NodeEntity/@RelationshipEntity
      (SCOPE.Schema, INFERRED_FROM_NEO4J_OGM). Emits DEPENDS_ON relationships
      for SDN and OGM mappings.
