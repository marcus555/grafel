frameworks:
  name: Android Jetpack Compose
  category: mobile_android_ui
  maven_coordinates: androidx.compose.ui:ui
  gradle_dependency: implementation 'androidx.compose.ui:ui'
  adoption_rank_2025: null
  detection:
    gradle_markers:
    - compose = true
    - buildFeatures { compose
    - composeOptions {
    - androidx.compose
    import_patterns:
    - import androidx.compose.runtime
    - import androidx.compose.ui
    - import androidx.compose.material
    - import androidx.compose.foundation
    code_patterns:
    - '@Composable'
    - setContent {
    - Surface {
    - Column {
    - Row {
    - LazyColumn {
    - remember {
    - mutableStateOf(
  notes: '@Composable annotation is definitive. buildFeatures.compose = true in build.gradle
    is the Gradle-level signal. Compose implies Kotlin but may appear in Java-adjacent
    projects.

    '
custom_extractors:
  - module: "memx_indexer.languages.java.android_extractor"
    function: "extract"
    description: "Extract Android Manifest components (activity/service/receiver/provider), Intent-based navigation, Fragment transactions, and ViewModel/LiveData dependencies. Emits DEPENDS_ON and OWNS relationships."
