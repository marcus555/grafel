frameworks:
  name: Robyn
  pypi_package: robyn
  category: web_async_api
  github_stars_2025: 4200+
  gateway: asgi
  detection:
    config_files:
    - app.py
    - server.py
    dependency_names:
    - robyn
    import_markers:
    - from robyn import Robyn
    - app = Robyn(__file__)
