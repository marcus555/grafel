orms_database:
  name: Django ORM
  pypi_package: django
  category: sql_orm
  detection:
    dependency_names:
    - Django
    - django
    model_file_patterns:
    - '*/models.py'
    - '*/models/*.py'
    - '*/migrations/*.py'
    import_markers:
    - from django.db import models
    - models.Model
    - 'class Meta:'
    - django.db.migrations
    migration_files:
    - '*/migrations/0001_initial.py'
    - '*/migrations/*.py'
  notes: 'Bundled with Django — not a standalone library. models.py with models.Model
    is definitive. migrations/ auto-generated by makemigrations.

    '
