skip_patterns:
- pattern: init_imports_only
  description: __init__.py containing only import statements and __all__
  match_conditions:
  - All top-level statements are Import or ImportFrom nodes
  - 'Optional: __all__ assignment'
  - No function or class definitions
  - No executable logic
  rationale: 'Package namespace files have no indexable entities. LLM enrichment of
    import-only __init__.py produces noise.

    '
- pattern: conftest_fixtures_only
  description: conftest.py containing only pytest fixture definitions
  match_conditions:
  - All function definitions decorated with @pytest.fixture
  - No test functions (no test_ prefix)
  - No business logic
  rationale: 'Test infrastructure files. Fixtures themselves are not indexable code
    entities of interest for context retrieval.

    '
- pattern: alembic_autogenerated_migration
  description: Auto-generated Alembic migration file
  match_conditions:
  - File in alembic/versions/ directory
  - 'Contains Alembic revision markers: # revision identifiers'
  - revision = '...' and down_revision = '...' variables
  - Contains upgrade() and downgrade() functions with op.* calls
  rationale: 'Alembic migrations are machine-generated DDL. They contain no business
    logic worth indexing. Revision metadata is not useful for code context retrieval.

    '
- pattern: main_only_entrypoint
  description: __main__.py or main block with only main() call
  match_conditions:
  - 'File contains only: if __name__ == ''__main__'': main()'
  - No function definitions beyond optional guard
  - No imports of business modules
  rationale: 'Pure dispatch entrypoint. All business logic is in imported modules.
    Indexing adds no signal.

    '
- pattern: protobuf_generated
  description: Auto-generated protobuf Python bindings
  match_conditions:
  - Filename matches *_pb2.py or *_pb2_grpc.py
  - 'Contains # Generated by the protocol buffer compiler comment'
  - Contains DESCRIPTOR = _descriptor.FileDescriptor
  rationale: 'Machine-generated from .proto files. Not human-authored code. Proto
    source files are the canonical representation.

    '
- pattern: type_stub_file
  description: Python type stub (.pyi) files
  match_conditions:
  - File extension is .pyi
  rationale: 'Type stubs contain signatures only — no implementation. Skip unless
    the project has no corresponding .py implementations (stub-only packages).

    '
- pattern: cache_artifact
  description: Python bytecode cache
  match_conditions:
  - File in __pycache__/ directory
  - File extension is .pyc or .pyo
  rationale: Compiled bytecode. Not source.
