complexity_signals:
- category: job_count
  description: 'The total number of distinct jobs in a pipeline is a direct proxy
    for build complexity. Each job adds build time (parallelism permitting) and introduces
    potential failure modes. High job counts (> 10-12) indicate heavy CI investment
    or overly granular job splitting.

    '
  thresholds:
    low: 1-3 jobs — simple single-service pipelines
    medium: 4-8 jobs — typical monorepo or multi-stage builds
    high: 9-15 jobs — complex multi-service or high parallelism
    very_high: '> 15 jobs — extreme parallelism or unnecessary job splitting'
  patterns:
  - Count of jobs: (GitHub Actions, CircleCI, Bitbucket steps)
  - 'Count of jobs: in workflows: section (CircleCI)'
  - Count of stage > job mappings (Azure Pipelines)
  indexing_note: 'Emit job_count as a numeric attribute on the pipeline entity. Pipelines
    with job_count > 12 are worth flagging for review (potential over-engineering).

    '
- category: stage_count
  description: 'The number of stages in a pipeline reflects build sequencing complexity.
    Each stage must complete before the next begins. High stage counts (> 5-6) may
    indicate overly sequential architecture or poor job parallelization.

    '
  thresholds:
    low: 1-2 stages — simple linear build (test → deploy)
    medium: 3-4 stages — standard multi-phase build
    high: 5-6 stages — complex orchestration
    very_high: '> 6 stages — overly sequential; candidate for refactoring'
  patterns:
  - Count of entries in stages: (GitLab CI, Azure Pipelines, Travis CI)
  - 'Implicit stage count (GitHub Actions: all jobs with same needs: depth)'
  indexing_note: 'Emit stage_count as numeric attribute. stage_count > 5 signals candidate
    for job parallelization review.

    '
- category: matrix_build_expansion
  description: 'Matrix builds (job parameterisation) expand a single job template
    across multiple combinations (e.g., 3 Node versions × 2 OSes = 6 job instances).
    The expansion multiplier (matrix dimension count and value counts) is a complexity
    indicator.

    '
  thresholds:
    low: No matrix or single dimension (e.g., 3 node versions)
    medium: 2 dimensions × moderate values (e.g., 3 versions × 2 OS = 6 jobs)
    high: 3+ dimensions or high value count (e.g., 4 versions × 3 OS × 2 archs = 24
      jobs)
    very_high: '> 30 job instances from single matrix'
  patterns:
  - GitHub Actions: strategy.matrix with multiple keys
  - 'GitLab CI: parallel: <N> or parallel: { matrix: [...] }'
  - 'CircleCI: parallelism: with test splitting'
  - 'Travis CI: env: with multiple values, matrix: combinations'
  - Bitbucket: N/A (no native matrix)
  - Azure: N/A (use repeats in templates)
  - Buildkite: N/A (use multiple steps)
  indexing_note: 'Emit matrix_dimension_count (number of parameterised axes) and total_matrix_expansion
    (product of dimension sizes). Expansion > 20 indicates potential test overhead.

    '
- category: job_dependency_chain_depth
  description: 'Jobs that depend on other jobs form a dependency chain. Long chains
    (A → B → C → D) are a bottleneck; they prevent parallelism. Chain depth is the
    longest path from entry to exit in the job dependency graph.

    '
  thresholds:
    low: No dependencies or depth <= 2 — mostly parallel execution
    medium: Depth 3-4 — some sequential phases
    high: Depth > 4 — heavy sequential bottlenecking
  patterns:
  - 'GitHub Actions: jobs with needs: [job1, job2] chaining across files'
  - 'GitLab CI: needs: [job1] DAG chains'
  - 'CircleCI: requires: in workflow job definitions'
  - 'Azure: dependsOn: in stage/job definitions'
  - 'Buildkite: wait: steps forcing synchronization'
  indexing_note: 'Emit max_dependency_chain_depth as numeric attribute. Depth > 4
    is a candidate for parallelization improvement.

    '
- category: conditional_execution_complexity
  description: 'Pipelines with heavy conditional logic (many if/when clauses) are
    harder to reason about. Conditions control job execution based on branch, tag,
    event type, or custom expressions.

    '
  patterns:
  - 'GitHub Actions: if: with complex boolean expressions'
  - 'GitLab CI: rules: or when: with multiple conditions'
  - 'CircleCI: when: [always|on_success|on_fail] in jobs'
  - 'Azure: condition: with complex expressions'
  - 'Travis: if: clauses on stages/jobs'
  - 'Buildkite: if: in command steps'
  complexity_signals:
  - Count of conditional branches (if:, when:, rules:)
  - Nesting depth of conditionals (AND/OR chains > 3 levels)
  - Reference complexity (vars, secrets, computed values)
  indexing_note: 'Emit conditional_branch_count and max_nesting_depth. Pipelines with
    > 8 conditional branches are candidates for refactoring.

    '
- category: artifact_and_cache_management
  description: 'Large artifact uploads, many cache keys, or complex retention policies
    indicate build overhead. Artifacts and caches consume storage and add latency.

    '
  patterns:
  - GitHub Actions: actions/upload-artifact with large path globs
  - GitLab: artifacts.paths with many entries, artifacts.expire_in
  - CircleCI: store_artifacts with large directories
  - Bitbucket: artifact_paths with broad globs
  - Azure: PublishBuildArtifacts with large pathToPublish
  - Buildkite: artifact_paths with many patterns
  signals:
  - Artifact path count > 5
  - Cache key count > 3
  - Retention policies > 30 days (storage cost)
  - Cache miss rate (inferred from re-run patterns)
  indexing_note: 'Emit artifact_count and cache_count. artifact_count > 5 signals
    potential over-retention; cache_count > 3 signals cache strategy complexity.

    '
- category: parallel_execution_degree
  description: 'The number of jobs executing in parallel determines overall pipeline
    throughput. High parallelism (> 10 concurrent jobs) may exceed resource limits
    or incur high costs.

    '
  patterns:
  - GitHub Actions: default parallelism (all jobs in parallel)
  - GitLab: jobs within same stage run in parallel
  - 'CircleCI: workflow job parallelism, parallelism: per job'
  - Bitbucket: N/A (steps are sequential)
  - Azure: jobs within same stage in parallel (or implicit)
  - 'Buildkite: steps before wait: are parallel'
  thresholds:
    low: 1-3 concurrent jobs
    medium: 4-8 concurrent jobs
    high: 9-15 concurrent jobs
    very_high: '> 15 concurrent jobs (may exceed runner availability)'
  indexing_note: 'Emit max_parallel_jobs. Pipelines with > 15 concurrent jobs are
    candidates for concurrency limiting via pool controls.

    '
- category: runner_resource_variability
  description: 'Pipelines using multiple runner types (ubuntu, macos, windows, self-hosted)
    or resource classes (large, medium, small) indicate environment diversity and
    potential portability issues.

    '
  patterns:
  - GitHub Actions: runs-on with ubuntu-latest, macos-latest, windows-latest, self-hosted
  - CircleCI: multiple executor types (docker, machine, macos, windows)
  - Azure: agent.pool variation
  - 'Travis: os: [linux, osx, windows]'
  - 'Buildkite: agents: with tag diversity'
  complexity_signals:
  - Runner type count > 2 (e.g., ubuntu + macos + windows)
  - Self-hosted runner usage (additional maintenance)
  - Custom machine type selections (large, xlarge, etc)
  indexing_note: 'Emit runner_types (list) and max_runner_count. Pipelines with 3+
    runner types signal cross-platform CI investment.

    '
- category: secret_and_environment_variable_count
  description: 'High counts of environment variables or secrets indicate configuration
    coupling or secrets sprawl. Each secret is a source of truth that must be kept
    in sync.

    '
  patterns:
  - GitHub Actions: ${{ secrets.* }} references in steps
  - 'GitLab: variables: section entries, $CI_* predefined vars'
  - CircleCI: contexts and environment variable references
  - 'Bitbucket: variables: and $BITBUCKET_* references'
  - 'Azure: variables: and $(Build.*), $(System.*) references'
  - 'Travis: env: entries and $TRAVIS_* predefined vars'
  - 'Buildkite: env: entries and $BUILDKITE_* references'
  thresholds:
    low: 1-5 custom env vars
    medium: 6-12 custom env vars
    high: '> 12 custom env vars (candidate for consolidation)'
  indexing_note: 'Emit custom_env_var_count and secret_count. Pipelines with > 12
    custom env vars signal configuration sprawl.

    '
- category: deployment_target_count
  description: 'Multiple deployment targets (prod, staging, dev) or post-pipeline
    triggers (GitHub deployments, Azure release pipelines) indicate release complexity.

    '
  patterns:
  - 'GitHub Actions: environment: and deployment steps'
  - 'GitLab: environment: in job definitions'
  - CircleCI: deploy job in workflow
  - 'Azure: deployment: job type and environment references'
  - 'Travis: deploy: section with multiple providers'
  - 'Buildkite: trigger: steps for downstream pipelines'
  thresholds:
    low: 0-1 deployment target
    medium: 2-3 deployment targets (e.g., staging + prod)
    high: '> 3 targets (e.g., dev + staging + prod + canary)'
  indexing_note: 'Emit deployment_target_count. Pipelines with > 3 targets signal
    multi-environment release strategy.

    '
