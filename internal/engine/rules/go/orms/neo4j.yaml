orms_database:
  name: Neo4j Go Driver
  category: graph_database
  module_path: github.com/neo4j/neo4j-go-driver/v5
  adoption_rank_2025: 1
  detection:
    go_mod_require:
    - github.com/neo4j/neo4j-go-driver
    import_markers:
    - '"github.com/neo4j/neo4j-go-driver'
    code_patterns:
    - neo4j.NewDriverWithContext(
    - session.Run(
  notes: >
    Official Neo4j Go driver (v4 and v5). Uses neo4j.NewDriverWithContext
    as the primary connection API.

# ---------------------------------------------------------------------------
# Extraction schema
# ---------------------------------------------------------------------------

file_conventions: []
source_patterns: []
relationship_rules: []

custom_extractors:
  - module: "archigraph.engine.rules.languages.neo4j.neo4j_extractor"
    function: "extract"
    description: >
      Cross-language Neo4j extractor: driver connections (SCOPE.Service,
      INFERRED_FROM_NEO4J_DRIVER), Cypher query strings (SCOPE.Operation/query,
      INFERRED_FROM_NEO4J_CYPHER) with node labels and relationship types.
