database_libraries:
  name: GORM
  module_path: gorm.io/gorm
  category: orm
  github_stars_2025: 38000+
  detection:
    go_mod_require:
    - gorm.io/gorm
    import_markers:
    - '"gorm.io/gorm"'
    - '"gorm.io/driver/postgres"'
    - '"gorm.io/driver/mysql"'
    - '"gorm.io/driver/sqlite"'
    structural_markers:
    - gorm.DB
    - db.AutoMigrate(
    - db.Find(
    - db.Create(
    - gorm.Model
  notes: 'Most popular Go ORM. v2 uses custom domain gorm.io/gorm (no /v2 suffix).
    Driver packages (gorm.io/driver/*) are co-detection signals. AutoMigrate usage
    signals schema management pattern.

    '
  model_class_patterns:
  - gorm.Model
