database_libraries:
  name: sqlc
  module_path: github.com/sqlc-dev/sqlc
  category: sql_code_gen
  github_stars_2025: 14500+
  detection:
    go_mod_require:
    - github.com/sqlc-dev/sqlc
    config_files:
    - sqlc.yaml
    - sqlc.yml
    structural_markers:
    - sqlc.yaml
    - db/query/
    - db/sqlc/
    - // Code generated by sqlc. DO NOT EDIT.
  notes: 'Type-safe SQL code generator. sqlc.yaml is the definitive config signal.
    Generated files contain "Code generated by sqlc" header. query/ directory with
    .sql files alongside generated Go is high-confidence structural signal.

    '
