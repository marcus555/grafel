orms_database:
  name: Neo4j Kotlin Driver
  category: graph_database
  maven_coordinates: org.neo4j.driver:neo4j-java-driver
  adoption_rank_2025: 1
  detection:
    gradle_markers:
    - neo4j-java-driver
    - spring-data-neo4j
    import_patterns:
    - import org.neo4j.driver
    - import org.springframework.data.neo4j
    code_patterns:
    - GraphDatabase.driver(
    - '@Node'
    - '@Relationship'
  notes: >
    Kotlin uses the Java Neo4j driver plus kotlinx.coroutines extensions.
    Spring Data Neo4j supports Kotlin data classes with @Node.

# ---------------------------------------------------------------------------
# Extraction schema
# ---------------------------------------------------------------------------

file_conventions: []
source_patterns: []
relationship_rules: []

custom_extractors:
  - module: "archigraph.engine.rules.languages.neo4j.neo4j_extractor"
    function: "extract"
    description: >
      Cross-language Neo4j extractor: driver connections (SCOPE.Service,
      INFERRED_FROM_NEO4J_DRIVER), Cypher query strings (SCOPE.Operation/query,
      INFERRED_FROM_NEO4J_CYPHER), Spring Data Neo4j @Node (SCOPE.Schema,
      INFERRED_FROM_NEO4J_SDN).
