orms_database:
  name: AWS DynamoDB Kotlin SDK (aws.sdk.kotlin:dynamodb)
  category: nosql_database
  gradle_dependency: implementation("aws.sdk.kotlin:dynamodb")
  detection:
    import_patterns:
    - import aws.sdk.kotlin.services.dynamodb
    code_patterns:
    - DynamoDbClient.builder()
    - DynamoDbEnhancedClient.builder()
    - '@DynamoDbBean'
  notes: >
    The AWS SDK for Kotlin (aws.sdk.kotlin:dynamodb) is the official Kotlin
    client. DynamoDB Enhanced Client annotations are also supported.

file_conventions: []
source_patterns: []
relationship_rules: []

custom_extractors:
  - module: "memx_indexer.languages.dynamodb.dynamodb_extractor"
    function: "extract"
    description: >
      Cross-language DynamoDB extractor: DynamoDbClient.builder() connections
      (SCOPE.Service, INFERRED_FROM_DYNAMODB_CLIENT), table definitions and
      @DynamoDbBean (SCOPE.Schema, INFERRED_FROM_DYNAMODB_TABLE /
      INFERRED_FROM_DYNAMODB_ENHANCED), query/scan operations (SCOPE.Operation/query,
      INFERRED_FROM_DYNAMODB_QUERY), streams (SCOPE.Operation/stream_op,
      INFERRED_FROM_DYNAMODB_STREAM), DAX (SCOPE.Service, INFERRED_FROM_DYNAMODB_DAX),
      single-table design (SCOPE.Pattern, INFERRED_FROM_DYNAMODB_SINGLE_TABLE).
