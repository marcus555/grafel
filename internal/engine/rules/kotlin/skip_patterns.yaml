skip_patterns:
- pattern: '*_Generated.kt'
  reason: Annotation processor / code generation output
  examples:
  - UserDao_Generated.kt (Room)
  - HiltComponents_Generated.kt
- pattern: BuildConfig.kt
  reason: Android build-time generated config
  notes: 'Contains buildConfigField values injected at build time. In newer AGP versions,
    BuildConfig.kt replaces BuildConfig.java.

    '
- pattern: R.kt
  reason: Android KSP-generated resource identifiers
  notes: 'Generated by Android resource compiler. Replaces R.java in KSP-based Android
    projects. Always in build/ directory.

    '
- pattern: build/**/*.kt
  reason: All files under build/ directory are generated
  examples:
  - build/generated/ksp/
  - build/generated/source/kapt/
  - build/tmp/
- pattern: '**/*\.pb.kt'
  reason: Protocol Buffers generated Kotlin source
- pattern: '**/*GeneratedBy*.kt'
  reason: Pattern used by Dagger/Hilt generated sources
- pattern: '**/*_Impl.kt'
  reason: Room DAO and Database implementation generated by Room compiler
  examples:
  - AppDatabase_Impl.kt
  - UserDao_Impl.kt
- pattern: kapt/**
  reason: kapt annotation processing output directory
- pattern: kspKotlin/**
  reason: KSP (Kotlin Symbol Processing) output directory
