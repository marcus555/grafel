orms_database:
  name: REST::Neo4p (Neo4j Perl Driver)
  category: graph_database
  cpan_module: REST::Neo4p
  adoption_rank_2025: 1
  detection:
    cpanfile_markers:
    - REST::Neo4p
    import_patterns:
    - use REST::Neo4p
    code_patterns:
    - REST::Neo4p->connect(
  notes: >
    Community Neo4j Perl driver (REST::Neo4p). Uses REST::Neo4p->connect()
    for connection initialization via Neo4j REST API.

# ---------------------------------------------------------------------------
# Extraction schema
# ---------------------------------------------------------------------------

file_conventions: []
source_patterns: []
relationship_rules: []

custom_extractors:
  - module: "archigraph.engine.rules.languages.neo4j.neo4j_extractor"
    function: "extract"
    description: >
      Cross-language Neo4j extractor: driver connections via REST::Neo4p
      (SCOPE.Service, INFERRED_FROM_NEO4J_DRIVER), Cypher queries
      (SCOPE.Operation/query, INFERRED_FROM_NEO4J_CYPHER).
