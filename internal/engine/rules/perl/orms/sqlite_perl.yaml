orms_database:
  name: Perl SQLite Driver (DBD::SQLite via DBI)
  category: sqlite_driver
  cpan_modules:
    - DBD::SQLite
    - DBI
  detection:
    import_patterns:
      - use DBD::SQLite
      - use DBI
    code_patterns:
      - DBI->connect("dbi:SQLite:
      - DBI->connect('dbi:SQLite:
      - ":memory:"
  notes: >
    DBD::SQLite is a self-contained Perl DBI driver for SQLite. It bundles
    the SQLite C library, requiring no external SQLite installation. The DBI
    connection string uses dbi:SQLite:dbname=/path/to/db or
    dbi:SQLite:dbname=:memory: for in-memory use.

file_conventions: []
source_patterns: []
relationship_rules: []

custom_extractors:
  - module: "memx_indexer.languages.sqlite.sqlite_extractor"
    function: "extract"
    description: >
      Cross-language SQLite extractor: DBD::SQLite DBI connections
      (SCOPE.Service, INFERRED_FROM_SQLITE_DRIVER), WAL mode
      (SCOPE.Pattern, INFERRED_FROM_SQLITE_WAL), FTS virtual tables
      (SCOPE.Schema/fts, INFERRED_FROM_SQLITE_FTS). In-memory databases
      flagged with is_in_memory=true.
