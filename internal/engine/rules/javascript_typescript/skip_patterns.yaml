skip_patterns:
  description: Files and patterns to skip during indexing — no meaningful code memories
  barrel_files:
    description: Index files that only re-export other modules
    file_patterns:
    - index.ts
    - index.js
    - index.tsx
    - index.jsx
    detection_rule: "File qualifies as barrel if ALL top-level statements are:\n \
      \ - ExportNamedDeclaration with source (re-export: export { X } from './x')\n\
      \  - ExportAllDeclaration (export * from './x')\nA file mixing re-exports with\
      \ local declarations should NOT be skipped.\n"
    rationale: Barrel files have no logic — indexing them creates noise with no code
      memory value
  type_declaration_files:
    description: Generated TypeScript type definition files
    file_patterns:
    - '**/*.d.ts'
    exceptions:
    - 'Custom hand-written .d.ts for ambient module declarations may be worth indexing
      (use heuristic: >50 lines with JSDoc comments)'
    rationale: Auto-generated type declarations duplicate information already in source
  config_objects:
    description: Files that are pure configuration — no logic, no functions
    file_patterns:
    - '*.config.js'
    - '*.config.ts'
    - '*.config.mjs'
    detection_rule: "Skip if file exports only:\n  - A single ObjectExpression (export\
      \ default { ... })\n  - No FunctionDeclaration or ArrowFunctionExpression with\
      \ body length > 3 statements\n"
    exceptions:
    - next.config.js often contains rewrites/redirects logic — do not skip
    - webpack.config.js may contain plugin factory calls — evaluate
  generated_files:
    description: Files generated by build tools or code generators
    file_patterns:
    - '**/*.generated.ts'
    - '**/*.generated.js'
    - '**/__generated__/**'
    - '**/generated/**'
    - '**/.next/**'
    - '**/dist/**'
    - '**/build/**'
    - '**/out/**'
    - '**/.expo/**'
    - '**/node_modules/**'
    rationale: Generated files change on every build; indexing them creates stale
      memories
  empty_components:
    description: React/Vue components with no meaningful logic
    detection_rule: "Skip if component:\n  - Returns only static JSX with no props,\
      \ state, or hooks\n  - Has < 5 meaningful AST nodes in component body (excluding\
      \ return statement)\n"
    examples:
    - const Divider = () => <hr />
    - 'const Spacer = () => <div style={{ height: 16 }} />'
  test_mock_files:
    description: Mock and fixture files used only in tests
    file_patterns:
    - '**/__mocks__/**'
    - '**/__fixtures__/**'
    - '**/mocks/**'
    - '**/*.mock.ts'
    - '**/*.mock.js'
    - '**/fixtures/**'
  style_files:
    description: CSS/styling files imported into JS modules
    file_patterns:
    - '**/*.css'
    - '**/*.scss'
    - '**/*.sass'
    - '**/*.less'
    - '**/*.module.css'
    - '**/*.module.scss'
    exceptions:
    - CSS-in-JS (styled-components, emotion) lives in .ts/.tsx files — not skipped
