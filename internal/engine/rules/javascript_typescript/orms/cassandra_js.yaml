orms_database:
  name: cassandra-driver (DataStax Node.js Driver)
  category: nosql_database
  npm_package: cassandra-driver
  detection:
    import_patterns:
    - require('cassandra-driver')
    - from 'cassandra-driver'
    - cassandra-driver
    code_patterns:
    - new Client({
    - contactPoints
  notes: >
    The official DataStax cassandra-driver for Node.js / TypeScript.
    Covers both CommonJS require and ESM import patterns.

file_conventions: []
source_patterns: []
relationship_rules: []

custom_extractors:
  - module: "archigraph.engine.rules.languages.cassandra.cassandra_extractor"
    function: "extract"
    description: >
      Cross-language Cassandra extractor: Client instantiation
      (SCOPE.Service, INFERRED_FROM_CASSANDRA_DRIVER), CQL execution
      (SCOPE.Operation/cql, INFERRED_FROM_CASSANDRA_CQL), prepared
      statements (SCOPE.Operation/prepared, INFERRED_FROM_CASSANDRA_PREPARED).
