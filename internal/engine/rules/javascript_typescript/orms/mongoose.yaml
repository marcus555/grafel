orms_and_database:
  name: mongoose
  npm_packages:
  - mongoose
  config_files: []
  detection_signals:
    package_json_deps:
    - mongoose
    import_patterns:
    - from 'mongoose'
    - require('mongoose')
  code_patterns:
  - mongoose.connect(
  - new mongoose.Schema(
  - mongoose.model(
  - Schema.Types.
  notes: MongoDB ODM; no config file — detect via dep + mongoose.connect() call
custom_extractors:
  - module: archigraph.engine.rules.languages.javascript_typescript.mongoose_extractor
    callable: extract
    frameworks:
      - mongoose
