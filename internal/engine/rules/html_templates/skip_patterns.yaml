skip_patterns:
  description: HTML/template files and patterns to skip during indexing — low or zero
    code memory value
  minified_html:
    description: Minified HTML files — single long line, no template logic readable
    detection_rule: "Skip if:\n  - File is a single line AND\n  - Line length > 500\
      \ characters AND\n  - No template engine syntax markers present\n"
    file_patterns:
    - '*.min.html'
    rationale: Minified HTML has no indexable structure — all component information
      is lost
  static_marketing_pages:
    description: Static HTML pages with no template logic — typically landing pages
      or marketing copy
    detection_rule: "Skip if ALL of the following hold:\n  - No template engine syntax\
      \ markers (no {{ }}, <% %>, {# #}, etc.)\n  - No framework-specific directives\
      \ (no *ngIf, v-if, {#if}, etc.)\n  - File is in a directory matching: public/,\
      \ static/, marketing/, landing/, site/\n  - No <script type=\"text/template\"\
      > blocks\n"
    examples:
    - public/index.html (boilerplate SPA entry)
    - marketing/hero.html (static promotional copy)
    - docs/index.html (static doc site entry point)
    rationale: Pure static HTML pages contain no logic or component structure worth
      indexing
  boilerplate_index_html:
    description: Auto-generated or near-empty index.html files used as SPA entry points
    detection_rule: "Skip if file matches ALL:\n  - Filename is index.html\n  - File\
      \ contains <div id=\"root\"></div> OR <div id=\"app\"></div> OR <app-root></app-root>\n\
      \  - File has fewer than 30 meaningful lines of content\n  - No template engine\
      \ markers present\n"
    file_patterns:
    - public/index.html
    - dist/index.html
    - build/index.html
    - www/index.html
    rationale: SPA shell index.html files are boilerplate — the actual component code
      is in JS/TS files
  auto_generated_documentation_html:
    description: HTML files generated by documentation tools — godoc, jsdoc, rustdoc,
      etc.
    detection_rule: "Skip if directory matches: docs/, doc/, api-docs/, javadoc/,\
      \ generated-docs/\nAND file contains generator comment patterns:\n  - \"<!--\
      \ Generated by ...\"\n  - \"<!-- This file is auto-generated\"\n  - \"<!-- DO\
      \ NOT EDIT\"\n  - \"// Code generated by\"\n"
    examples:
    - docs/api/index.html (godoc output)
    - api-docs/UserService.html (jsdoc output)
    rationale: Generated documentation HTML mirrors source code already indexed —
      duplicate signal
  email_templates:
    description: HTML email templates — inline-style heavy, no component architecture
    detection_rule: 'Skip if directory matches: emails/, email-templates/, mailers/views/

      AND file contains inline style attributes on >50% of elements

      AND no template inheritance markers present

      '
    rationale: Email HTML uses table-based layout with heavy inlining — not component-oriented
  compiled_template_output:
    description: Pre-compiled template output files — PHP compiled views, Blade cache,
      Twig cache
    file_patterns:
    - storage/framework/views/*.php
    - var/cache/twig/**
    - cache/smarty/**
    - .twig.php
    - '**/__pycache__/**/*.html'
    rationale: Compiled views duplicate source template content with compiler-added
      boilerplate
  vendor_and_third_party:
    description: Template files inside vendor or third-party dependency directories
    directory_patterns:
    - vendor/**
    - node_modules/**
    - bower_components/**
    - .bundle/**
    rationale: Third-party templates are not project code — indexing them pollutes
      the org graph
