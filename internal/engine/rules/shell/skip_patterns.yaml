skip_patterns:
- pattern: node_modules/.bin/*
  reason: npm-installed CLI wrappers — auto-generated, not authored code
  examples:
  - node_modules/.bin/jest
  - node_modules/.bin/tsc
- pattern: '*-completion.bash'
  reason: Shell tab-completion scripts — auto-generated by tools
  examples:
  - kubectl-completion.bash
  - helm-completion.bash
  - gh-completion.bash
  also_matches:
  - '*_completion.bash'
  - '*-completion.zsh'
  - '*_completion.zsh'
  - '*-completion.fish'
  - _*.zsh
- pattern: '*.envrc'
  reason: .envrc files (direnv) set environment variables only — no logic to index
  examples:
  - .envrc
  - project/.envrc
- pattern: '*.env'
  reason: Environment variable files — key=value pairs, not shell code
  examples:
  - .env
  - .env.local
  - .env.production
- pattern: .git/hooks/*
  reason: Git-managed hook directory. Authored hooks live in hooks/ — skip .git/
  examples:
  - .git/hooks/pre-commit
  - .git/hooks/commit-msg
- pattern: vendor/**/*.sh
  reason: Vendored shell scripts from third-party sources
- pattern: '**/.terraform/**'
  reason: Terraform provider scripts and shell wrappers — auto-generated
- pattern: '**/dist/**/*.sh'
  reason: Distribution artifacts — built, not authored
- pattern: '**/node_modules/**'
  reason: All node_modules content
- pattern: '**/__pycache__/**'
  reason: Python build artifacts — not shell code
- pattern: bootstrap.sh
  reason: 'Generic bootstrap scripts that just install dependencies (curl | bash patterns).
    Usually not meaningful for code architecture analysis.

    '
  notes: Flag for review rather than hard-skip — some bootstrap.sh files contain real
    logic.
- pattern: install.sh
  reason: 'One-shot installer scripts — similar to bootstrap.sh. Often curl | bash
    download-and-run patterns. Index only if they contain project-specific logic.

    '
