frameworks:
  name: Blazor WebAssembly
  category: web_spa_wasm
  nuget_package: Microsoft.AspNetCore.Components.WebAssembly
  sdk_attribute: Microsoft.NET.Sdk.BlazorWebAssembly
  adoption_rank_2025: 4
  detection:
    csproj_sdk:
    - Sdk="Microsoft.NET.Sdk.BlazorWebAssembly"
    csproj_package_references:
    - Microsoft.AspNetCore.Components.WebAssembly
    - Microsoft.AspNetCore.Components.WebAssembly.DevServer
    config_files:
    - wwwroot/index.html
    - _Imports.razor
    - App.razor
    code_patterns:
    - WebAssemblyHostBuilder.CreateDefault(
    - builder.RootComponents.Add<
    - await builder.Build().RunAsync()
    - HttpClient
    - '@inject HttpClient'
    notes: 'Sdk="Microsoft.NET.Sdk.BlazorWebAssembly" is definitive. wwwroot/index.html
      (not _Host.cshtml) distinguishes WASM from Server. Hosted WASM projects have
      Client/Server/Shared subproject structure.

      '
custom_extractors:
  - module: memx_indexer.languages.csharp.blazor_extractor
    function: extract
    description: >
      Extracts Blazor @page route directives as SCOPE.Operation/endpoint,
      @inject DI declarations as SCOPE.Component with DEPENDS_ON relationships,
      @code block methods as SCOPE.Operation/function, PascalCase component tags
      as SCOPE.UIComponent/component with OWNS relationships, [Parameter] and
      [CascadingParameter] properties, and @layout/@inherits directives.
