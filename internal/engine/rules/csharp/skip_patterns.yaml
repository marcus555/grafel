skip_patterns:
- pattern: obj/
  reason: MSBuild intermediate build output directory — compiled artifacts, not source
  match_type: directory_prefix
  examples:
  - obj/Debug/net8.0/
  - obj/Release/net8.0/ref/
- pattern: bin/
  reason: MSBuild build output directory — final binaries, not source
  match_type: directory_prefix
  examples:
  - bin/Debug/net8.0/
  - bin/Release/net8.0/publish/
- pattern: '*.Designer.cs'
  reason: 'WinForms auto-generated designer code for form layout — not business logic.
    Regenerated by the WinForms designer on every visual edit.

    '
  match_type: filename_suffix
  examples:
  - MainForm.Designer.cs
  - UserControl1.Designer.cs
- pattern: '*.g.cs'
  reason: 'Source generator output files — auto-generated at build time by Roslyn
    source generators (e.g., EF Core compiled models, System.Text.Json context, gRPC
    generated stubs, Blazor component code-behind, MAUI generated types). Not handwritten
    code.

    '
  match_type: filename_suffix
  examples:
  - ApplicationDbContext.g.cs
  - AppJsonSerializerContext.g.cs
  - Greeter.cs.g.cs
  - MainPage.g.cs
- pattern: '*.g.i.cs'
  reason: 'Roslyn source generator intermediate files — companion to .g.cs files.
    Generated during incremental compilation, contain IntelliSense scaffolding.

    '
  match_type: filename_suffix
- pattern: AssemblyInfo.cs
  reason: 'Auto-generated assembly metadata file (pre-SDK style or legacy projects).
    Contains version, copyright, and CLSCompliant attributes — not business logic.

    '
  match_type: filename_exact
  examples:
  - Properties/AssemblyInfo.cs
- pattern: GlobalUsings.cs
  reason: 'Auto-generated or manually maintained global using directives file (C#
    10+). Contains only using statements — no logic.

    '
  match_type: filename_exact
  examples:
  - GlobalUsings.cs
  - Usings.cs
- pattern: '*.resx'
  reason: 'XML resource files for localization and embedded resources — not code.
    Contain string literals, images, and other embedded resources.

    '
  match_type: filename_suffix
- pattern: packages/
  reason: Legacy NuGet packages restore directory (pre-PackageReference format)
  match_type: directory_exact
- pattern: .vs/
  reason: Visual Studio local IDE settings — not source
  match_type: directory_prefix
- pattern: TestResults/
  reason: Test runner output directory — not source
  match_type: directory_prefix
