orms_database:
  name: R SQLite Driver (RSQLite via DBI)
  category: sqlite_driver
  cran_packages:
    - RSQLite
    - DBI
  detection:
    import_patterns:
      - library(RSQLite)
      - library(DBI)
      - require(RSQLite)
    code_patterns:
      - dbConnect(RSQLite::SQLite()
      - dbConnect(SQLite()
      - ":memory:"
      - dbGetQuery(
      - dbExecute(
  notes: >
    RSQLite provides an SQLite interface for R via DBI. The standard connection
    pattern is dbConnect(RSQLite::SQLite(), "mydb.sqlite"). Using ":memory:"
    as the dbname creates an in-memory database — common in R test suites.

file_conventions: []
source_patterns: []
relationship_rules: []

custom_extractors:
  - module: "archigraph.engine.rules.languages.sqlite.sqlite_extractor"
    function: "extract"
    description: >
      Cross-language SQLite extractor: RSQLite dbConnect connections
      (SCOPE.Service, INFERRED_FROM_SQLITE_DRIVER), WAL mode
      (SCOPE.Pattern, INFERRED_FROM_SQLITE_WAL), FTS virtual tables
      (SCOPE.Schema/fts, INFERRED_FROM_SQLITE_FTS). In-memory databases
      flagged with is_in_memory=true.
