skip_patterns:
  build_output:
  - .build/ (SPM build output)
  - DerivedData/ (Xcode build cache — global at ~/Library/Developer/Xcode/DerivedData/)
  - '*.app/ (application bundle)'
  - '*.framework/ (framework bundle output)'
  - '*.dSYM/ (debug symbols)'
  - '*.xcarchive/ (Xcode archive)'
  - '*.ipa (app archive)'
  - build/ (if present at root)
  dependency_caches:
  - Pods/ (CocoaPods downloaded sources)
  - Carthage/Build/ (Carthage built frameworks)
  - Carthage/Checkouts/ (Carthage cloned sources)
  - .swiftpm/ (SPM package cache)
  generated_files:
  - '*.generated.swift (code generation tools — Sourcery, SwiftGen, Mockolo)'
  - R.generated.swift (R.swift resource accessor)
  - '*.pb.swift (protobuf generated — SwiftProtobuf)'
  - '*.grpc.swift (gRPC generated — grpc-swift)'
  - Mocks/ or *Mock.swift generated by Mockolo/Sourcery
  - DI/GeneratedDI.swift (Needle DI generated)
  - '*.mom (compiled Core Data model)'
  - '*.momd/ (compiled versioned Core Data model)'
  interface_builder:
    items:
    - '*.storyboard (XML — skip content; detect presence only)'
    - '*.xib (XML — skip content; detect presence only)'
    notes: 'Storyboard/XIB files are XML representations of visual layouts. Detect
      their presence as a UIKit signal but do not index their content. Exception:
      storyboard/xib files with custom Swift class references in xml attribute customClass=
      may be scanned for class names only.

      '
  xcode_metadata:
  - '*.xcuserstate (binary Xcode UI state)'
  - xcuserdata/ (user-specific breakpoints, schemes)
  - '*.xcworkspacedata (XML workspace definition — detect presence only)'
  - project.xcworkspace/ (inside *.xcodeproj — skip)
  - '*.xcresult/ (test result bundle)'
  test_fixtures:
  - '*.xcresult/ (test results)'
  - __Snapshots__/ (snapshot test reference images)
  - '*.png / *.jpg inside Tests/ (snapshot images)'
