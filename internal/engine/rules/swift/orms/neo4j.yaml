orms_database:
  name: Theo (Neo4j Swift Driver)
  category: graph_database
  swift_package: theo
  adoption_rank_2025: 1
  detection:
    package_swift_markers:
    - theo
    import_patterns:
    - import Theo
    code_patterns:
    - TheoDB(
    - ClientProtocol
  notes: >
    Community Neo4j Swift driver (Theo). Uses TheoDB for connection
    and ClientProtocol for session management.

# ---------------------------------------------------------------------------
# Extraction schema (MX-574)
# ---------------------------------------------------------------------------

file_conventions: []
source_patterns: []
relationship_rules: []

custom_extractors:
  - module: "memx_indexer.languages.neo4j.neo4j_extractor"
    function: "extract"
    description: >
      Cross-language Neo4j extractor: driver connections via Theo
      (SCOPE.Service, INFERRED_FROM_NEO4J_DRIVER), Cypher queries
      (SCOPE.Operation/query, INFERRED_FROM_NEO4J_CYPHER).
