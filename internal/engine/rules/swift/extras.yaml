mobile:
  frameworks:
    swiftui:
      import_pattern: import SwiftUI
      code_patterns:
      - 'struct * : View {'
      - 'var body: some View {'
      - '@main'
      - '@State'
      - '@Binding'
      - '@StateObject'
      - '@ObservedObject'
      - '@EnvironmentObject'
      - '@Environment(\.'
      - NavigationStack {
      - List {
      - LazyVGrid {
      - '@ViewBuilder'
      platform_minimum: iOS 13.0 / macOS 10.15 / tvOS 13.0 / watchOS 6.0
    uikit:
      import_pattern: import UIKit
      code_patterns:
      - 'class * : UIViewController {'
      - 'class AppDelegate: UIResponder, UIApplicationDelegate'
      - '@IBOutlet'
      - '@IBAction'
      - override func viewDidLoad()
      - 'override func prepare(for segue:'
      - UITableView
      - UICollectionView
      - UINavigationController
      - UITabBarController
      storyboard_signals:
      - '*.storyboard'
      - '*.xib'
      - Main.storyboard
      - LaunchScreen.storyboard
      - UIMainStoryboardFile in Info.plist
    combine:
      import_pattern: import Combine
      code_patterns:
      - '@Published'
      - ObservableObject
      - AnyPublisher<
      - PassthroughSubject<
      - CurrentValueSubject<
      - '.store(in: &cancellables)'
    swiftdata:
      import_pattern: import SwiftData
      code_patterns:
      - '@Model'
      - '@Query'
      - ModelContainer(
      - modelContainer(for:)
      minimum_os: iOS 17.0 / macOS 14.0
    core_data:
      files:
      - '*.xcdatamodeld/'
      - '*.xcdatamodel/'
      import_pattern: import CoreData
      code_patterns:
      - NSManagedObject
      - NSManagedObjectContext
      - NSPersistentContainer
      - NSFetchRequest<
      - '@NSManaged'
      - NSPersistentStoreCoordinator
      - NSEntityDescription
  package_managers:
    spm:
      detection_files:
      - Package.swift (root)
      - Package.resolved
      structure:
      - Sources/ (library/executable targets)
      - Tests/ (test targets)
      - .build/ (output — skip)
      signals:
      - 'swift-tools-version: comment in Package.swift'
      - .package(url:, from:) in dependencies
      - .target(name:, dependencies:)
    cocoapods:
      detection_files:
      - Podfile
      - Podfile.lock
      - '*.xcworkspace/ (generated by pod install)'
      - Pods/ (generated — skip)
      signals:
      - platform :ios, '*.0' in Podfile
      - target '...' do
      - pod 'LibraryName'
      - use_frameworks!
    carthage:
      detection_files:
      - Cartfile
      - Cartfile.resolved
      - Carthage/Build/ (generated — skip)
      - Carthage/Checkouts/ (generated — skip)
      signals:
      - github "Owner/Repo"
      - binary "https://..."
    xcode_project:
      detection_files:
      - '*.xcodeproj/'
      - '*.xcworkspace/'
      - '*.pbxproj (inside xcodeproj)'
      - Info.plist
      - '*.entitlements'
      signals:
      - PRODUCT_BUNDLE_IDENTIFIER in *.pbxproj
      - SWIFT_VERSION in *.pbxproj
      - IPHONEOS_DEPLOYMENT_TARGET in *.pbxproj
      - CODE_SIGN_IDENTITY in *.pbxproj
  app_store_targets:
  - PRODUCT_BUNDLE_IDENTIFIER matches *.* pattern in *.pbxproj
  - CODE_SIGN_IDENTITY = "iPhone Developer" or "Apple Distribution"
  - PROVISIONING_PROFILE_SPECIFIER in *.pbxproj
  - '*.ipa presence (archive output)'
  - ExportOptions.plist
  - fastlane/Fastfile with deliver or pilot
  - '*.xcarchive/ (archive output — skip contents)'
domain_roots:
  spm_library_or_cli:
    description: Pure SPM package — library or CLI tool, no Xcode project
    root_indicators:
    - Package.swift at repo root
    - NO *.xcodeproj present
    - Sources/<TargetName>/ (source root)
    - Tests/<TargetName>Tests/ (test root)
    primary_source_root: Sources/
    test_root: Tests/
    entry_point: Sources/<ExecutableName>/main.swift (for CLIs)
    notes: 'Canonical for server-side Swift (Vapor, Hummingbird) and cross-platform
      Swift packages. Sources/ contains one or more named target directories.

      '
  xcode_single_target_app:
    description: Classic Xcode iOS/macOS app with single app target
    root_indicators:
    - '*.xcodeproj/ at or near root'
    - AppName/ (source directory matching scheme name)
    - AppName/AppDelegate.swift or @main struct
    - AppNameTests/ and/or AppNameUITests/
    primary_source_root: <AppName>/ (matches PRODUCT_NAME in *.pbxproj)
    test_root: <AppName>Tests/
    ui_test_root: <AppName>UITests/
    notes: 'Default Xcode project template layout. Source directory name matches the
      app target name. Multiple targets (app + widget + notification extension) each
      have their own directory.

      '
  xcode_workspace_multi_target:
    description: Xcode workspace with multiple projects (typical CocoaPods or multi-module)
    root_indicators:
    - '*.xcworkspace/ at root'
    - Podfile (CocoaPods) or multiple *.xcodeproj
    - Frameworks/ or Modules/ subdirectories
    primary_source_root: <AppName>/ (main app target)
    notes: 'CocoaPods always generates an *.xcworkspace. Multi-module Xcode setups
      also use workspaces. Open *.xcworkspace, not *.xcodeproj, after pod install.

      '
  spm_xcode_hybrid:
    description: SPM-managed dependencies integrated directly into Xcode project (SPM
      inside Xcode)
    root_indicators:
    - '*.xcodeproj/ present'
    - Package.swift present (may be nested or at root)
    - NO Podfile
    - Package.resolved inside *.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/
    primary_source_root: <AppName>/
    notes: 'Modern approach (Xcode 12+): use SPM for dependencies, Xcode for the app
      target. Package.resolved lives inside *.xcodeproj. No Pods/ directory. Increasingly
      common in new projects as CocoaPods usage declines.

      '
  vapor_server:
    description: Vapor server-side Swift application
    root_indicators:
    - Package.swift at root
    - Sources/App/ (application code)
    - Sources/App/routes.swift
    - Sources/App/configure.swift
    - Sources/Run/main.swift
    - Public/ (static assets)
    - Resources/Views/ (Leaf templates)
    primary_source_root: Sources/App/
    entry_point: Sources/Run/main.swift
    test_root: Tests/AppTests/
    notes: 'Vapor follows a fixed layout convention. Sources/App/ is always the domain
      root. Resources/Views/ present = Leaf templating engine in use.

      '
  tuist_project:
    description: Tuist-generated Xcode project (Swift DSL project definition)
    root_indicators:
    - Tuist/ directory
    - Project.swift at root
    - Workspace.swift at root (optional)
    - .tuist-version file
    primary_source_root: Sources/ or <TargetName>/ (defined in Project.swift)
    notes: 'Generated *.xcodeproj is typically gitignored. Project.swift is the source
      of truth for target structure. tuist generate must be run to open in Xcode.
      Domain roots are defined programmatically in Project.swift.

      '
