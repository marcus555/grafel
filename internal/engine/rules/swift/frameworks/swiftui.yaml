frameworks:
  name: SwiftUI
  category: mobile_ui_declarative
  spm_coordinates:
  - N/A — bundled with Xcode / Apple SDK
  detection:
    config_files:
    - '*.xcodeproj/'
    - '*.xcworkspace/'
    - Package.swift
    - Info.plist
    build_signals:
    - import SwiftUI (in any .swift file)
    - MinimumOSVersion >= 13.0 in Info.plist (SwiftUI minimum)
    - SWIFT_VERSION = 5 in *.pbxproj
    import_patterns:
    - import SwiftUI
    code_patterns:
    - 'struct * : View {'
    - 'var body: some View {'
    - '@main'
    - WindowGroup {
    - NavigationStack {
    - NavigationView {
    - PreviewProvider
    - '#Preview {'
  notes: 'Apple declarative UI framework for all Apple platforms. Minimum deployment
    iOS 13 / macOS 10.15. struct conforming to View + body property is high-confidence
    signal. #Preview macro is Swift 5.9+ (Xcode 15+). Co-presence with @main and WindowGroup
    = app entry point.

    '
custom_extractors:
  - module: "archigraph.engine.rules.languages.swift.swiftui_extractor"
    function: "extract"
    description: "Extract SwiftUI View structs, body hierarchy nesting, NavigationStack paths, and @State/@Binding property wrapper relationships"
