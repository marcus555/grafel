skip_patterns:
- pattern: schema.json
  reason: introspection_output
  description: 'GraphQL introspection query result in JSON format. Contains __schema
    with all types, but is a derived artifact, not a source schema. Never index as
    source — it is generated from the real SDL.

    '
  match_conditions:
  - filename: schema.json
  - 'content_check: ''"__schema"'' key at root'
- pattern: introspection.json
  reason: introspection_output
  description: 'Explicitly named introspection output file. Same as schema.json —
    skip entirely.

    '
- pattern: '*.generated.ts'
  reason: codegen_output
  description: 'TypeScript files generated by graphql-codegen. Contain typed operation
    hooks, typed document nodes, and operation result types. These are build artifacts
    — the source is the .graphql operation files plus the schema.

    '
  match_conditions:
  - filename_suffix: .generated.ts
  - common_names:
    - graphql.generated.ts
    - operations.generated.ts
    - types.generated.ts
    - schema.generated.ts
- pattern: '*.generated.tsx'
  reason: codegen_output
  description: 'TSX variant of generated file. Same as .generated.ts — skip.

    '
- pattern: generated.ts
  reason: codegen_output
  description: 'Single generated.ts file at schema root. Common output filename for
    graphql-codegen when outputFile is set to a single bundle.

    '
- pattern: __generated__/
  reason: codegen_output
  description: 'Relay Compiler output directory. Contains compiled query artifacts
    with hash-based IDs and generated TypeScript types. Never index.

    '
- pattern: node_modules/graphql/**
  reason: dependency_source
  description: 'The graphql npm package source. Contains reference implementation
    SDL parser and execution engine. Not application code.

    '
- pattern: node_modules/@graphql-codegen/**
  reason: dependency_source
  description: 'graphql-codegen tooling source. Not application code.

    '
- pattern: '**/schema.introspect.json'
  reason: introspection_output
  description: 'Explicitly named introspection snapshot. Used by some CI pipelines
    to cache introspection results. Skip — derived artifact.

    '
- pattern: '**/__schema_query_result.json'
  reason: introspection_output
  description: 'Raw __schema query result files. Sometimes saved by development tools
    or testing infrastructure. Skip.

    '
- pattern: dist/**/*.graphql
  reason: build_artifact
  description: 'Bundled or copied .graphql files in dist/ output directories. Index
    only the source .graphql files, not copies.

    '
- pattern: coverage/**
  reason: test_artifact
  description: 'Test coverage output directories. May contain .graphql fixtures copied
    by test harness. Skip.

    '
